<style>
/* ════════════════════════════════════════════════════════════
   CSS VARIABLES — colours, tile sizes (JS updates tile sizes on resize)
   ════════════════════════════════════════════════════════════ */
:root{
  --jade:#1a6b45;--jl:#2a9e67;--jd:#0d3d28;
  --gold:#c9a84c;--gl:#f0d080;--gd:#8a6b20;--cream:#f5edd8;
  /* Responsive tile sizes via CSS vars — JS updates these on resize */
  --tlg-w:40px;--tlg-h:56px;
  --tmd-w:26px;--tmd-h:36px;
  --tsm-w:16px;--tsm-h:22px;
}
/* ════ RESET & BASE ════ */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:#060c07;color:var(--cream);font-family:'Noto Sans JP',sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
/* ════ BACKGROUND LAYERS ════ */
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 85%,rgba(26,107,69,.3),transparent 55%),radial-gradient(ellipse at 80% 15%,rgba(201,168,76,.14),transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(12,35,20,.85),#040a05 100%);}
.bgg{position:fixed;inset:0;z-index:0;opacity:.03;background-image:repeating-linear-gradient(0deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 40px),repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 40px);}
.screen{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;}
.screen.hidden{display:none!important;}

/* ════════════════════════════════════════════════════════════
   LOBBY SCREEN
   ════════════════════════════════════════════════════════════ */
#s-lobby{flex-direction:column;gap:18px;}
.logo{text-align:center;animation:float 5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-k{font-family:'Noto Serif JP',serif;font-size:clamp(40px,10vw,72px);font-weight:900;letter-spacing:clamp(4px,2vw,12px);
  background:linear-gradient(135deg,#ffe680,#c9a84c,#8a6b20);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 24px rgba(201,168,76,.7));}
.logo-s{font-family:'Cinzel Decorative',serif;font-size:clamp(10px,2.5vw,14px);color:var(--jl);letter-spacing:clamp(3px,1.5vw,8px);margin-top:2px;}
.card{background:linear-gradient(155deg,rgba(20,55,35,.95),rgba(8,20,12,.98));border:1px solid rgba(201,168,76,.35);border-radius:16px;
  padding:clamp(20px,4vw,34px) clamp(18px,5vw,46px);width:min(440px,96vw);
  box-shadow:0 0 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,168,76,.25);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.card h2{font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:5px;color:var(--gold);opacity:.75;margin-bottom:18px;text-align:center;}
.ig{margin-bottom:16px;}.ig label{display:block;font-size:10px;letter-spacing:3px;color:var(--gold);opacity:.65;margin-bottom:6px;text-transform:uppercase;}
.ig input{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:11px 14px;color:var(--cream);font-size:16px;outline:none;transition:border-color .3s;font-family:'Noto Sans JP',sans-serif;}
.ig input:focus{border-color:var(--jl);}
.bp{width:100%;padding:13px;background:linear-gradient(135deg,var(--jade),var(--jd));border:1px solid var(--jl);border-radius:10px;color:var(--cream);font-size:13px;font-family:'Cinzel Decorative',serif;letter-spacing:3px;cursor:pointer;transition:all .25s;}
.bp:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(26,107,69,.55);border-color:var(--gold);}
.bp:disabled{opacity:.4;cursor:default;transform:none;}
.bs{width:100%;padding:10px;background:transparent;border:1px solid rgba(201,168,76,.3);border-radius:10px;color:rgba(245,237,216,.65);font-size:12px;font-family:'Cinzel Decorative',serif;letter-spacing:3px;cursor:pointer;transition:all .25s;margin-top:8px;}
.bs:hover{border-color:var(--gold);color:var(--gl);}
.wa{display:none;margin-top:14px;}
.wm{text-align:center;color:var(--jl);font-size:12px;letter-spacing:2px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes ld-bounce{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
.ld-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:ld-bounce 1.2s ease-in-out infinite;}
.slots{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.slot{width:80px;min-height:64px;border-radius:10px;border:2px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;background:rgba(0,0,0,.4);transition:all .4s;padding:6px 4px;}
.slot .si{font-size:20px;line-height:1;}.slot .sn{font-size:9px;color:rgba(245,237,216,.7);font-weight:600;}.slot .sr{font-size:8px;margin-top:2px;}
.slot.filled{border-color:var(--jl);background:rgba(26,107,69,.25);}
.slot.bot{border-color:rgba(201,168,76,.35);background:rgba(50,35,5,.4);}
.slot.rdy{border-color:#4eff9a;box-shadow:0 0 14px rgba(78,255,154,.3);}
.cd{font-size:10px;color:rgba(201,168,76,.55);text-align:center;margin-top:8px;letter-spacing:1px;}
.mode-btn{flex:1;padding:10px 6px;background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.2);border-radius:8px;color:rgba(245,237,216,.6);font-size:13px;font-family:'Noto Serif JP',serif;font-weight:700;cursor:pointer;transition:all .2s;line-height:1.6;text-align:center;}
.mode-btn.active{background:rgba(26,107,69,.4);border-color:var(--jl);color:var(--cream);box-shadow:0 0 12px rgba(42,158,103,.3);}
.mode-btn:hover:not(.active){border-color:rgba(201,168,76,.4);color:var(--cream);}
.ready-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0a5a2a,#1a8840);border:2px solid #4eff9a;border-radius:10px;color:#c0ffd8;font-size:14px;font-family:'Cinzel Decorative',serif;letter-spacing:3px;cursor:pointer;transition:all .25s;margin-top:12px;position:relative;overflow:hidden;}
.ready-btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(78,255,154,.4);}
.ready-btn.pressed{opacity:.6;cursor:default;transform:none;}
.ready-btn.pressed::after{content:'✓ Ready!';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a5a2a,#1a8840);font-size:14px;letter-spacing:3px;}

/* ════════════════════════════════════════════════════════════
   GAME SCREEN — LAYOUT
   ════════════════════════════════════════════════════════════ */
#s-game{display:block;}
.topbar{position:fixed;top:0;left:0;right:0;height:36px;background:rgba(3,10,5,.97);border-bottom:1px solid rgba(201,168,76,.18);display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:50;}
.tb-title{font-family:'Noto Serif JP',serif;font-size:12px;color:var(--gold);letter-spacing:2px;}
.tb-st{font-size:11px;color:rgba(245,237,216,.5);max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-st.my{color:#ffdd44;font-weight:700;animation:pulse 1s infinite;}
.bl{padding:0 10px;height:26px;background:rgba(120,20,20,.8);border:1px solid rgba(200,60,60,.4);border-radius:6px;color:rgba(255,180,180,.85);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;}
.bl:hover{background:rgba(160,30,30,.9);}

/* ── Table container ── */
.table{position:fixed;top:36px;left:0;right:0;bottom:0;overflow:hidden;}

/* ── Felt (green play area) + oak frame (box-shadow) ── */
.felt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(96vmin,920px);height:min(96vmin,920px);
  background:radial-gradient(ellipse at 40% 35%,#27774a,#155230 60%,#0e3b24);
  border-radius:0;
  border:none;
  box-shadow:
    inset 0 0 60px rgba(0,0,0,.4),
    0 0 0 80px #1a0a04,
    0 0 0 82px #0d0502,
    8px 8px 40px 82px rgba(0,0,0,.8);}

/* ── Centre info panel (round/wind/scores) ── */
.ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:5;pointer-events:none;
  background:#1a1a1a;
  width:min(26vmin,210px);height:min(26vmin,210px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0;overflow:hidden;
  border-radius:4px;}
/* Score strip rows — double line separator using border + box-shadow */
.ctr-score{font-size:clamp(12px,2.1vmin,15px);font-weight:700;letter-spacing:0;
  width:100%;text-align:center;padding:5px 0;
  border-bottom:1px solid #444;
  box-shadow:0 1px 0 #222;  /* second line below */
  background:#1e1e1e;}
.ctr-score:last-child{border-bottom:none;box-shadow:none;
  border-top:1px solid #444;
  box-shadow:inset 0 1px 0 #222;  /* second line above */
  background:#1e1e1e;}
.ctr-mid{display:flex;align-items:center;width:100%;flex:1;min-height:0;}
/* Side score cells — dashed vertical separator */
.ctr-side{flex:1;padding:5px 0;border-right:1px dashed #3a3a3a;}
.ctr-side:last-child{border-right:none;border-left:1px dashed #3a3a3a;}
/* Centre info */
.ctr-score-val{font-size:clamp(12px,2.1vmin,15px);font-weight:700;
  color:rgba(240,208,128,.9);letter-spacing:0;display:inline-block;}
.ctr-info{display:flex;flex-direction:column;align-items:center;flex-shrink:0;
  padding:4px 8px;position:relative;}
.ctr-info::before{content:'';position:absolute;
  width:clamp(36px,7vmin,56px);height:clamp(36px,7vmin,56px);
  border-radius:50%;border:1px solid rgba(201,168,76,.25);
  background:rgba(201,168,76,.04);
  top:50%;left:50%;transform:translate(-50%,-65%);}
.cw{font-family:'Noto Serif JP',serif;font-size:clamp(28px,6vmin,42px);font-weight:900;
  color:#f0d080;line-height:1;position:relative;z-index:1;
  text-shadow:0 0 14px rgba(201,168,76,.6),0 0 4px rgba(0,0,0,.8);}
.ci{font-size:clamp(7px,1.3vmin,9px);letter-spacing:2px;color:rgba(245,237,216,.35);
  margin-top:2px;position:relative;z-index:1;}
.cwl{font-size:clamp(9px,1.8vmin,11px);color:#2a9e67;font-weight:700;
  margin-top:1px;position:relative;z-index:1;}
.ch{font-size:clamp(7px,1.3vmin,9px);color:rgba(245,237,216,.28);
  margin-top:1px;position:relative;z-index:1;}
/* ── Dora indicator strip ── */
.dora-slot{width:var(--tlg-w,46px);height:var(--tlg-h,64px);border-radius:5px;border:1px dashed rgba(201,168,76,.25);
  background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;}
.dora-slot.filled{border:none;background:none;padding:0;}
/* Ankan face-down tiles */
.kan-back{
  width:var(--tmd-w,26px);height:var(--tmd-h,36px);
  background:linear-gradient(135deg,#1a3a6a,#0d1f3a);
  border:1px solid #2a4a8a;border-radius:3px;
  flex-shrink:0;display:inline-flex;
  box-shadow:1px 2px 4px rgba(0,0,0,.5);
}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* ════════════════════════════════════════════════════════════
   DISCARD ZONES
   ════════════════════════════════════════════════════════════ */
.dz{position:absolute;display:flex;flex-direction:column;gap:2px;pointer-events:none;}
.dz-row{display:flex;flex-direction:row;gap:2px;}

/* H = min(13vmin,105px) = panel half-size */

/* H = min(13vmin,105px) — panel half-size. */

/* BOTTOM: top-left of zone at panel bottom-left. No rotation. */
.dzb{top:calc(50% + min(13vmin,105px));left:calc(50% - min(13vmin,105px));}

/* TOP: their visual top-left (= DOM bottom-right after 180°) at panel top-left.
   Panel top-left = (50%-H, 50%-H). 
   right=50%+H → element right edge at 50%-H.
   bottom=50%+H → element bottom at 50%-H.
   transform-origin: right bottom. 
   Rows: DOM row-reverse so tiles go their left→right after 180° flip.
   Columns: column-reverse so first row is at visual top (nearest panel). */
.dzt{
  top:calc(50% - min(13vmin,105px));
  left:calc(50% + min(13vmin,105px));
  transform:rotate(180deg);
  transform-origin:left top;}

/* LEFT: their visual top-left (= DOM bottom-left after 90°CW) at panel bottom-left.
   Panel bottom-left = (50%-H, 50%+H).
   left=50%-H → element left edge at 50%-H.
   bottom=50%-H → element bottom at 50%+H.
   transform-origin: left bottom. */
.dzl{
  left:calc(50% - min(13vmin,105px));
  top:calc(50% - min(13vmin,105px));
  transform:rotate(90deg);
  transform-origin:left top;}

/* RIGHT: their visual top-left (= DOM top-left after -90°) at panel bottom-right.
   Panel bottom-right = (50%+H, 50%+H).
   left=50%+H, top=50%+H. transform-origin: left top. */
.dzr{
  top:calc(50% + min(13vmin,105px));
  left:calc(50% + min(13vmin,105px));
  transform:rotate(-90deg);
  transform-origin:left top;}

/* Riichi tile: rotated 90° within its zone row (from each player's perspective) */
.dz-riichi{display:inline-flex;transform:rotate(-90deg);transform-origin:center center;
  margin:0 calc(var(--tmd-h,40px)/2 - var(--tmd-w,30px)/2);}

/* ════════════════════════════════════════════════════════════
   PLAYER AREAS (hand + melds)
   ════════════════════════════════════════════════════════════ */
.pa{position:absolute;display:flex;align-items:center;z-index:15;}
/* Bottom (me): flush to bottom edge, column layout (nameplate above tiles) */
.pa-b{bottom:15px;left:0;right:0;flex-direction:column;align-items:center;}
/* Top: flush to top edge, column layout (tiles first, nameplate below) */
.pa-t{top:15px;left:0;right:0;flex-direction:column;align-items:center;}
/* Left: pivot at left edge, centred vertically, rotated 90° CW */
.pa-l{position:absolute;top:50%;left:0;
  display:flex;flex-direction:column;align-items:flex-start;
  transform:translateY(-50%) rotate(90deg);
  transform-origin:left center;}
/* Right: pivot at right edge, centred vertically, rotated -90° CCW */
.pa-r{position:absolute;top:50%;right:0;
  display:flex;flex-direction:column;align-items:flex-start;
  transform:translateY(-50%) rotate(-90deg);
  transform-origin:right center;}

/* Nameplates */
.np{background:#1a1a1a;border-radius:4px;
  padding:7px 14px;display:flex;align-items:center;gap:9px;
  z-index:20;transition:all .25s;flex-shrink:0;white-space:nowrap;
  box-shadow:0 0 0 1px #222,inset 0 1px 0 rgba(255,255,255,.04);}
.np.active{background:#222;border-color:#ffdd44;
  box-shadow:0 0 0 2px rgba(255,221,68,.3),0 0 16px rgba(255,221,68,.5);animation:glow 1s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px rgba(255,221,68,.3),0 0 14px rgba(255,221,68,.4);}50%{box-shadow:0 0 0 3px rgba(255,221,68,.55),0 0 28px rgba(255,221,68,.7);}}
.wb{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:900;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(201,168,76,.18);color:var(--gl);border:1px solid rgba(201,168,76,.45);flex-shrink:0;}
.pname{font-size:14px;font-weight:700;color:#fff;max-width:110px;overflow:hidden;text-overflow:ellipsis;}
.btag{font-size:10px;color:rgba(201,168,76,.5);}
.rs{display:inline-block;width:4px;height:22px;background:linear-gradient(180deg,#fff,#ddd);border-radius:3px;border:1px solid #bbb;margin-left:3px;}
.tenpai{display:inline-block;padding:2px 6px;border-radius:4px;background:linear-gradient(135deg,#6a0f0f,#c02020);color:#fff;font-size:8px;letter-spacing:1px;font-family:'Cinzel Decorative',serif;animation:pulse 1s infinite;margin-left:3px;}

/* ════════════════════════════════════════════════════════════
   TILES
   ════════════════════════════════════════════════════════════
/* ── TILES ──
   All sizes driven by CSS vars set dynamically by JS on resize.
   This makes everything scale to fit any screen. */
.tile{position:relative;display:inline-flex;align-items:center;justify-content:center;cursor:default;flex-shrink:0;overflow:hidden;pointer-events:none;}

.tlg{
  width:var(--tlg-w,40px);height:var(--tlg-h,56px);border-radius:5px;
  background:linear-gradient(170deg,#fffdf4,#f8edd8);
  border:1px solid #c8a84a;border-bottom:3px solid #7a5c10;
  box-shadow:2px 3px 8px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.95);
  transition:transform .12s ease,box-shadow .12s ease;}
.tlg.play{cursor:pointer;pointer-events:auto;}
.tlg.play:hover,.tlg.play:active{transform:translateY(-10px);box-shadow:2px 12px 18px rgba(0,0,0,.7),inset 0 2px 0 rgba(255,255,255,.95);z-index:20;}
.tlg.sel{transform:translateY(-16px);box-shadow:0 0 0 3px #00ffaa,2px 18px 24px rgba(0,0,0,.75);z-index:25;}

/* Draw tile — far right, taller glow, shimmer animation */
.tlg.drw{
  border-color:#ffe066;
  box-shadow:2px 3px 8px rgba(0,0,0,.6),0 0 0 2px rgba(255,220,50,.6),inset 0 2px 0 rgba(255,255,255,.95);
  z-index:5;}

.tmd{
  width:var(--tmd-w,26px);height:var(--tmd-h,36px);border-radius:3px;
  background:linear-gradient(170deg,#fffdf4,#f8edd8);
  border:1px solid #c8a84a;border-bottom:2px solid #7a5c10;
  box-shadow:1px 2px 4px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.9);
  display:inline-flex;align-items:center;justify-content:center;}
.tsm{
  display:inline-flex;
  width:var(--tsm-w,16px);height:var(--tsm-h,22px);border-radius:3px;
  background:linear-gradient(145deg,#1a5c70,#0e3a48);
  border:1px solid #3a90aa;box-shadow:1px 2px 4px rgba(0,0,0,.5);
  flex-shrink:0;position:relative;}
.tsm::before{content:'';position:absolute;inset:2px;border:1px solid rgba(255,255,255,.12);border-radius:2px;}
.tsm.rot{width:var(--tsm-h,22px);height:var(--tsm-w,16px);}
.tdora{width:var(--tlg-w,46px);height:var(--tlg-h,64px);border-radius:5px;
  background:linear-gradient(170deg,#fffdf4,#f8edd8);border:1px solid #c8a84a;border-bottom:3px solid #7a5c10;
  box-shadow:2px 3px 8px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.95);
  display:inline-flex;align-items:center;justify-content:center;}

/* Hand layout */
.hr{display:flex;align-items:flex-end;gap:2px;flex-wrap:nowrap;}
/* Gap between main hand and draw tile */
.draw-sep{width:clamp(5px,1.5vmin,10px);flex-shrink:0;}
.mg{display:flex;gap:1px;margin-right:0;margin-left:4px;align-items:flex-end;}
/* Called tile (chi/pon) rotated 90° to show it was taken from another player */
.mg .called{transform:rotate(-90deg);
  margin-right:calc(var(--tmd-h,40px)/2 - var(--tmd-w,26px)/2 + 1px);
  margin-left:calc(var(--tmd-h,40px)/2 - var(--tmd-w,26px)/2 + 1px);}
/* Kakan stack */
.mg .called-stack{position:relative;display:inline-flex;align-items:flex-end;justify-content:center;
  width:var(--tmd-h,40px);
  height:calc(var(--tmd-w,26px) + var(--tmd-w,26px) * 0.55);
  margin-right:calc(var(--tmd-h,40px)/2 - var(--tmd-w,26px)/2 + 1px);
  margin-left:calc(var(--tmd-h,40px)/2 - var(--tmd-w,26px)/2 + 1px);}
.mg .called-stack .kakan-base{transform:rotate(-90deg);flex-shrink:0;}
.mg .called-stack .kakan-add{position:absolute;bottom:calc(var(--tmd-w,26px) * 0.45);left:50%;transform:translateX(-50%) rotate(-90deg);z-index:2;}
.mr{display:flex;gap:0;align-items:flex-end;flex-shrink:0;}

/* ════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════ */
.actbar{display:none;}
/* Floating action overlay — appears above the hand */
.act-overlay{display:flex;gap:6px;align-items:center;
  z-index:40;pointer-events:none;flex-wrap:nowrap;flex-shrink:0;}
.act-overlay.visible{pointer-events:auto;}
.ba{padding:0 clamp(10px,2vw,20px);height:38px;border:none;border-radius:8px;

  flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.6);}
.ba:hover{filter:brightness(1.2);transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.7);}
.ba:active{transform:translateY(0);}
.ba:disabled{opacity:.3;cursor:default;transform:none;filter:none;}
.hint{display:none;}
.bdis{background:#8a1818;color:#ffd8d8;border:2px solid #d44;}
.btsu{background:#8a6500;color:#fff8d0;border:2px solid #f0d060;font-weight:900;}
.brii{background:#1e1e8a;color:#d0d0ff;border:2px solid #77f;}
.bron{background:#aa1010;color:#fff;border:2px solid #f66;box-shadow:0 0 16px rgba(220,50,50,.6);font-weight:900;}
.bchi{background:#145a14;color:#c0ffc0;border:2px solid #4d4;}
.bpon{background:#6a3800;color:#ffe0b0;border:2px solid #ca0;}
.bkan{background:linear-gradient(135deg,#3a0a5a,#6a1a9a);color:#e8d0ff;border:2px solid #a060d0;}
.bpas{background:rgba(40,40,40,.95);color:rgba(245,237,216,.7);border:1px solid rgba(255,255,255,.2);}

/* ════════════════════════════════════════════════════════════
   CHAT
   ════════════════════════════════════════════════════════════ */
/* Chat bar: fixed to bottom-right, sits above action bar */
.chat-bar{
  position:fixed;bottom:20px;right:20px;
  display:none;flex-direction:row;align-items:center;gap:5px;
  background:rgba(3,12,6,.95);border:1px solid rgba(201,168,76,.25);
  border-radius:10px;padding:5px 8px;z-index:65;
  box-shadow:0 4px 16px rgba(0,0,0,.6);}
.chat-input{width:160px;padding:5px 8px;background:rgba(0,0,0,.45);
  border:1px solid rgba(201,168,76,.2);border-radius:7px;
  color:var(--cream);font-size:12px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.chat-input:focus{border-color:var(--jl);}
.chat-send{padding:0 10px;height:26px;background:rgba(26,107,69,.8);
  border:1px solid var(--jl);border-radius:7px;color:var(--cream);
  font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;}
.chat-send:hover{background:rgba(42,158,103,.9);}
/* History button */
.chat-hist-btn{position:relative;padding:0 10px;height:26px;
  background:none;border:none;border-left:1px solid rgba(201,168,76,.2);
  color:rgba(201,168,76,.6);font-size:11px;letter-spacing:1px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;
  transition:color .2s;}
.chat-hist-btn:hover{color:var(--gl);}
.chat-hist-btn.open{color:var(--gl);}
.chat-hist-btn .badge{position:absolute;top:-5px;right:2px;
  background:#c02020;color:#fff;font-size:8px;font-weight:700;
  min-width:14px;height:14px;border-radius:7px;display:none;
  align-items:center;justify-content:center;padding:0 2px;}
.chat-hist-btn .badge.show{display:flex;}
/* History popup — opens upward from chat bar */
.chat-panel{position:fixed;bottom:106px;right:12px;
  width:clamp(220px,35vw,300px);max-height:260px;
  background:rgba(5,14,8,.97);border:1px solid rgba(201,168,76,.3);
  border-radius:12px;z-index:74;display:none;flex-direction:column;
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.8);
  animation:slideUpChat .2s ease;}
@keyframes slideUpChat{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-panel.open{display:flex;}
.chat-panel-header{padding:7px 12px;background:rgba(26,107,69,.25);
  border-bottom:1px solid rgba(201,168,76,.2);font-size:10px;letter-spacing:2px;
  color:var(--gold);font-family:'Cinzel Decorative',serif;
  display:flex;justify-content:space-between;align-items:center;}
.chat-close{background:none;border:none;color:rgba(245,237,216,.45);
  font-size:15px;cursor:pointer;line-height:1;padding:0;}
.chat-close:hover{color:var(--cream);}
.chat-history{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;}
.chat-history::-webkit-scrollbar{width:4px;}
.chat-history::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px;}
.chat-entry{display:flex;flex-direction:column;gap:1px;}
.chat-entry-who{font-size:9px;letter-spacing:1px;font-weight:700;}
.chat-entry-text{font-size:12px;color:var(--cream);background:rgba(255,255,255,.05);
  border-radius:6px;padding:4px 8px;line-height:1.4;word-break:break-word;}
.chat-entry-time{font-size:8px;color:rgba(245,237,216,.3);margin-top:1px;}

/* Floating chat messages — appear at top of playing mat, centred */
.chat-float{position:fixed;z-index:300;pointer-events:none;

.chat-msg{font-family:'Noto Serif JP',serif;font-size:clamp(28px,5vw,52px);font-weight:900;
  text-shadow:0 0 20px rgba(201,168,76,.9),0 2px 10px rgba(0,0,0,.95),0 0 40px rgba(201,168,76,.5);

@keyframes chatFloat{0%{opacity:0;transform:translateY(-10px) scale(.9);}10%{opacity:1;transform:translateY(0) scale(1);}75%{opacity:1;}100%{opacity:0;transform:translateY(-16px) scale(.95);}}

/* ── Toast notifications ── */
.tc{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;}

<script>
// SVG TILE RENDERER
// Draws each tile (man/pin/sou/honours) as inline SVG
// Pixel-faithful recreation of authentic Japanese riichi mahjong tiles.

function tsvg(t,w,h){
  if(!t) return '';
  const s=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  const e='</svg>';
  if(t.s==='m') return s+svgMan(t.v,w,h)+e;
  if(t.s==='p') return s+svgPin(t.v,w,h)+e;
  if(t.s==='s') return s+svgSou(t.v,w,h)+e;
  if(t.s==='z') return s+svgHon(t.v,w,h)+e;
  return '';
}

// MAN (マンズ) — Characters
// Numeral: red, large, centred in upper ~65% of tile
// 萬: small red label, bottom 18%
const MAN_K=['','一','二','三','四','伍','六','七','八','九'];
function svgMan(v,w,h){
  // Same font size for numeral and 萬, both centred in their half
  const fs=Math.round(h*.36);
  const numColor=v===5?'#c82020':'#1a1a1a';
  return (
    `<text x="${w*.5}" y="${h*.30}" text-anchor="middle" dominant-baseline="central" `+
    `font-family="'Yuji Syuku',serif" font-size="${fs}px" font-weight="400" fill="${numColor}">`+
    MAN_K[v]+`</text>`+
    `<text x="${w*.5}" y="${h*.70}" text-anchor="middle" dominant-baseline="central" `+
    `font-family="'Yuji Syuku',serif" font-size="${fs}px" font-weight="400" fill="#c82020">萬</text>`
  );
}

// PIN (ピンズ) — Circles
// From image: thick dark navy outer ring, white gap, thinner inner ring, white centre with flower
// 1-pin: large decorative circle (bigger rings, inner flower)
// 5-pin: red circles instead of navy
// PIN (ピンズ) — Circles with flower/petal design from image
// Each circle: outer ring, 6-petal inner ring, small centre dot
// Colours: 1=red outer+blue inner, 2-4=blue, 5=red, 6-9=blue with red accent
function svgPin(v,w,h){
  const pos=pinPos(v,w,h);
  const base=Math.min(w,h);
  const rMap={1:.30,2:.22,3:.20,4:.17,5:.155,6:.14,7:.128,8:.118,9:.110};
  const r=base*(rMap[v]||.11);
  const isRed=(v===5);
  const hasRedOuter=false;
  const hasRedInner=(v===1);
  return pos.map(([cx,cy,forceRed])=>pinCircle(cx,cy,r,isRed,hasRedOuter,hasRedInner,forceRed)).join('');
}

function pinCircle(cx,cy,r,isRed,hasRedOuter,hasRedInner,forceRedInner){
  const ringCol=(isRed||hasRedInner||forceRedInner)?'#c82020':'#1a3a8a';
  const outerCol=hasRedOuter?'#c82020':'#1a3a8a';
  const outerSW=Math.max(1.2,r*.25);
  const petalR=r*.60;
  const petalCount=6;
  let petals='';
  for(let i=0;i<petalCount;i++){
    const angle=(i/petalCount)*Math.PI*2 - Math.PI/2;
    const px=cx+Math.cos(angle)*petalR*.52;
    const py=cy+Math.sin(angle)*petalR*.52;
    const pr=petalR*.38;
    petals+=`<circle cx="${px}" cy="${py}" r="${pr}" fill="${ringCol}" opacity="0.85"/>`;
  }
  return (
    // White background
    `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#ffffff"/>`+
    // Outer ring
    `<circle cx="${cx}" cy="${cy}" r="${r-outerSW*.5}" fill="none" stroke="${outerCol}" stroke-width="${outerSW}"/>`+
    // Petal circles
    petals+
    // Centre dot
    `<circle cx="${cx}" cy="${cy}" r="${r*.18}" fill="${ringCol}"/>`+
    // White centre hole
    `<circle cx="${cx}" cy="${cy}" r="${r*.10}" fill="#ffffff"/>`
  );
}

function pinPos(v,w,h){
  const pw=w*.84, ph=h*.88;
  const ox=(w-pw)/2, oy=(h-ph)/2;
  const cx=w/2, cy=h/2;

  function col1(n){
    if(n===1) return [[cx,cy]];
    const step=ph/(n+0.4);
    return Array.from({length:n},(_,i)=>([cx, oy+step*(i+0.7)]));
  }
  function col2(nL,nR){
    const lx=ox+pw*.27, rx=ox+pw*.73;
    const stepL=ph/(nL+0.4), stepR=ph/(nR+0.4);
    const L=Array.from({length:nL},(_,i)=>([lx,oy+stepL*(i+0.7)]));
    const R=Array.from({length:nR},(_,i)=>([rx,oy+stepR*(i+0.7)]));
    return [...L,...R];
  }
  function col3(n){
    const lx=ox+pw*.17, mx=cx, rx=ox+pw*.83;
    const step=ph/(n+0.4);
    const pts=[];
    for(let i=0;i<n;i++) for(const x of[lx,mx,rx]) pts.push([x,oy+step*(i+0.7)]);
    return pts;
  }

  if(v===1) return [[cx,cy]];
  if(v===2) return col1(2);
  if(v===3){
    // Diagonal: top-left, centre (red), bottom-right
    const r3=Math.min(w,h)*.20;
    const off=Math.min(pw,ph)*.26;
    return [[cx-off,cy-off,false],[cx,cy,true],[cx+off,cy+off,false]];
  }
  if(v===4) return col2(2,2);
  if(v===5){ const g=col2(2,2); g.push([cx,cy]); return g; }
  if(v===6) return col2(3,3);
  if(v===7){
    const lx=ox+pw*.27, rx=ox+pw*.73;
    const L=Array.from({length:3},(_,i)=>([lx,oy+ph/(3+.4)*(i+.7)]));
    const R=Array.from({length:4},(_,i)=>([rx,oy+ph/(4+.4)*(i+.7)]));
    return [...L,...R];
  }
  if(v===8) return col2(4,4);
  if(v===9) return col3(3);
  return [];
}

// SOU (ソウズ) — Bamboo hourglass/bobbin sticks
// From image: wider top+bottom, narrow waist — like a bobbin/spool
// Green with red band at waist. 5-sou centre = red.
function svgSou(v,w,h){
  if(v===1) return souBird(w,h);
  return souLayout(v,w,h).map(([cx,cy,sw,sh,isRed])=>souStick(cx,cy,sw,sh,isRed)).join('');
}

function souStick(cx,cy,sw,sh,isRed){
  const x=cx-sw/2, y=cy-sh/2;
  const capH=sh*.22;   // top/bottom cap height
  const waistW=sw*.62; // narrow waist width
  const waistY=y+capH;
  const waistH=sh-capH*2;
  const bandH=Math.max(1.5,sh*.10);
  const bandY=cy-bandH/2;
  const fill=isRed?'#c82020':'#1c7530';
  const stroke=isRed?'#8a1010':'#0e4018';
  const hlCol=isRed?'#e86060':'#2db848';

  // Hourglass shape via path: wide top cap, narrow waist, wide bottom cap
  const tw=sw/2, ww=waistW/2;
  const path=`M${cx-tw},${y} Q${cx-tw},${waistY} ${cx-ww},${waistY} L${cx-ww},${waistY+waistH} Q${cx-tw},${waistY+waistH} ${cx-tw},${y+sh} L${cx+tw},${y+sh} Q${cx+tw},${waistY+waistH} ${cx+ww},${waistY+waistH} L${cx+ww},${waistY} Q${cx+tw},${waistY} ${cx+tw},${y} Z`;

  return (
    `<path d="${path}" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/>`+
    // Highlight on top cap
    `<rect x="${cx-sw*.28}" y="${y+sh*.04}" width="${sw*.22}" height="${capH*.55}" rx="${sw*.08}" fill="${hlCol}" opacity="0.5"/>`+
    // Red centre band
    (!isRed?`<rect x="${cx-ww}" y="${bandY}" width="${waistW}" height="${bandH}" fill="#c82020"/>`:'')
  );
}

function souLayout(v,w,h){
  const pad=w*.07;
  const uw=w-pad*2, uh=h-pad*2;
  const midX=w/2;
  const out=[];

  // GAP_RATIO: fraction of slot height that is empty gap between sticks
  const GAP=0.28;

  function placeCol(x, n, sw, startY, totalH){
    // Divide totalH into n equal slots, place stick in centre of each slot with gap
    const slot=totalH/n;
    const sh=slot*(1-GAP);
    for(let i=0;i<n;i++){
      const cy=startY+slot*(i+0.5);
      out.push([x, cy, sw, sh, false]);
    }
  }

  function col1(n){
    const sw=uw*.40;
    placeCol(midX, n, sw, pad, uh);
  }

  function col2(nL,nR,redCentre=false){
    const sw=uw*.22;
    const lx=midX-uw*.25, rx=midX+uw*.25;
    placeCol(lx, nL, sw, pad, uh);
    placeCol(rx, nR, sw, pad, uh);
    if(redCentre){
      // Red centre stick: fits in the middle gap of the 2-col layout
      const slot=uh/nL;
      const sh=slot*(1-GAP);
      out.push([midX, h/2, sw, sh, true]);
    }
  }

  function col3(n){
    const sw=uw*.16;
    const xs=[midX-uw*.28, midX, midX+uw*.28];
    for(const x of xs) placeCol(x, n, sw, pad, uh);
  }

  if(v===2) col1(2);
  else if(v===3) col1(3);
  else if(v===4) col2(2,2);
  else if(v===5) col2(2,2,true);
  else if(v===6) col2(3,3);
  else if(v===7) col2(3,4);
  else if(v===8){
    // 8-sou: 2 cols × 4 rows, tighter gap so hourglasses form W on top, M on bottom
    const sw=uw*.22;
    const lx=midX-uw*.25, rx=midX+uw*.25;
    const n=4;
    const slot=uh/n;
    const sh=slot*.88; // very small gap — sticks nearly touch so W/M emerges from hourglass waists
    for(let i=0;i<n;i++){
      const cy=pad+slot*(i+0.5);
      out.push([lx, cy, sw, sh, false]);
      out.push([rx, cy, sw, sh, false]);
    }
  }
  else if(v===9) col3(3);
  return out;
}

// HONOURS (字牌)
// Winds (東南西北): large near-black kanji, fills ~55% height
// Haku (白): plain white fill — no markings
// Hatsu (發): green kanji
// Chun (中): red kanji
function svgHon(v,w,h){
  if(v===5){
    return '';
  }
  const fs=Math.round(h*.52);
  const scaleY=1.45; // vertical stretch factor
  const COLORS={1:'#1a1a1a',2:'#1a1a1a',3:'#1a1a1a',4:'#1a1a1a',6:'#1a7a30',7:'#c82020'};
  const CHARS ={1:'東',2:'南',3:'西',4:'北',6:'發',7:'中'};
  const cy=h*.56;
  return (
    `<g transform="translate(${w*.5},${cy}) scale(1,${scaleY}) translate(-${w*.5},-${cy})">`+
    `<text x="${w*.5}" y="${cy}" text-anchor="middle" dominant-baseline="middle" `+
    `font-family="'Yuji Syuku',serif" font-size="${fs}px" font-weight="400" fill="${COLORS[v]}">${CHARS[v]}</text>`+
    `</g>`
  );
}

// APP STATE
const W=['東','南','西','北'];
// Position IDs indexed by (absSeat - mySeat + 4) % 4
// 0=bottom(me), 1=right, 2=top, 3=left
const P=['b','r','t','l'];

let ws=null, mySeat=-1, inGame=false, selId=null, lastState=null, isReady=false;

function show(id){['s-lobby','s-game','s-end'].forEach(s=>$(s).classList.toggle('hidden',s!==id));}
function $(id){return document.getElementById(id);}


// WEBSOCKET — connection + message dispatch
function connect(){
  if(!location.host){
    console.warn('No server host — open via http://localhost:3000');
    return;
  }
  const url=(location.protocol==='https:'?'wss':'ws')+'://'+location.host;
  try{ ws=new WebSocket(url); } catch(e){ setTimeout(connect,3000); return; }
  ws.onopen=()=>{};
  ws.onmessage=e=>{try{onMsg(JSON.parse(e.data));}catch(ex){console.error(ex);}};
  ws.onclose=()=>{setTimeout(connect,2000);};
  ws.onerror=()=>{try{ws.close();}catch{}};
}
function wss(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));}

function onMsg(m){
  if(m.type==='hello') return;
  if(m.type==='joined'){mySeat=m.seat;showWaiting();return;}
  if(m.type==='room_update'){updateSlots(m.seats);return;}
  if(m.type==='game_start'){startGame(m);return;}
  if(!inGame) return;
  if(m.type==='game_state'){lastState=m;renderState(m);}
  else if(m.type==='riichi'){onRiichi(m);}
  else if(m.type==='round_end'){onEnd(m);}
  else if(m.type==='round_start'){onRoundStart(m);}
  else if(m.type==='game_over'){onGameOver(m);}
  else if(m.type==='kan'){toast(W[(m.seat-mySeat+4)%4]+' カン！');}
  else if(m.type==='chat'){showChatMsg(m.seat,m.name,m.text);}
}


// LOBBY
let gameMode='tonpuu'; // 'tonpuu' or 'hanchan'

function setMode(mode){
  gameMode=mode;
  $('btn-tonpuu').classList.toggle('active', mode==='tonpuu');
  $('btn-hanchan').classList.toggle('active', mode==='hanchan');
}

function findMatch(){
  wss({type:'join',name:($('iname').value.trim()||'Player'),gameMode});
}

function showWaiting(){
  $('wa').style.display='block';
  $('bfind').style.display='none';
  $('cdiv').textContent='Press Ready when you are set to start';
}

function updateSlots(seats){
  $('wmsg').textContent=`${seats.filter(Boolean).length}/4 players`;
  document.querySelectorAll('.slot').forEach((sl,i)=>{
    const p=seats[i]; sl.innerHTML='';sl.className='slot';
    if(p){
      sl.classList.add('filled');
      if(p.isBot) sl.classList.add('bot');
      if(p.ready) sl.classList.add('rdy');
      const icon=p.isBot?'🤖':p.name[0].toUpperCase();
      const rdyTxt=p.isBot?'<span class="sr" style="color:#4eff9a">✓ BOT</span>':(p.ready?'<span class="sr" style="color:#4eff9a">✓ Ready</span>':'<span class="sr" style="color:rgba(245,237,216,.4)">Not ready</span>');
      sl.innerHTML=`<span class="si">${icon}</span><span class="sn">${p.isBot?p.name.slice(0,8):p.name.slice(0,8)}</span>${rdyTxt}`;
    } else {
      sl.innerHTML='<span class="si">🀄</span>';
    }
  });
}

function pressReady(){
  if(isReady) return;
  isReady=true;
  $('bready').classList.add('pressed');
  $('bready').disabled=true;
  wss({type:'ready'});
}

function resetLobby(){
  mySeat=-1;inGame=false;selId=null;lastState=null;isReady=false;
  $('wa').style.display='none';
  $('bfind').style.display='block';
  $('cdiv').textContent='';
  $('bready').classList.remove('pressed');
  $('bready').disabled=false;
  document.querySelectorAll('.slot').forEach(sl=>{sl.innerHTML='<span class="si">🀄</span>';sl.className='slot';});
  // Hide dora panel and reset chat badge
  $('dora-panel').style.display='none';
  $('chat-bar').style.display='none';
  $('chat-panel').classList.remove('open');
  chatOpen=false;
  unreadCount=0;
  const badge=$('chat-badge');
  badge.textContent='0';
  badge.classList.remove('show');
  show('s-lobby');
}

function goLobby(){
  if(inGame&&!confirm('Leave game and return to menu?')) return;
  inGame=false;
  wss({type:'leave'});
  if(ws){ws.onclose=null;ws.close();}
  resetLobby();
  setTimeout(connect,200);
}


// GAME START
function startGame(m){
  inGame=true;selId=null;lastState=null;
  const seats=m.seats;
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4,id=P[i],p=seats[abs];
    $('pn'+id).textContent=i===0?($('iname').value.trim()||'Player'):(p?.name||'—');
    if(i>0&&p?.isBot){const bt=$('bt'+id);if(bt)bt.textContent='CPU';}
    $('rs'+id).style.display='none';
  }
  // Clear board (same as onRoundStart)
  ['hdb','hdt','hdl','hdr','mlb','mlt','mll','mlr'].forEach(id=>{const el=$(id);if(el)el.innerHTML='';});
  ['dzb','dzt','dzl','dzr'].forEach(id=>{const el=$(id);if(el)el.innerHTML='';});
  // Set seat winds based on dealer
  const windLabels=['東','南','西','北'];
  const dealer=m.dealer??0;
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4, id=P[i];
    const wb=$('wb'+id);
    if(wb) wb.textContent=windLabels[(abs-dealer+4)%4];
  }
  // Show game mode in topbar
  const modeLabel=m.gameMode==='hanchan'?'半荘戦':'東風戦';
  $('tb-mode').textContent=modeLabel;
  $('chat-bar').style.display='flex'; chatOpen=false; unreadCount=0; $('chat-history').innerHTML='';
  $('dora-panel').style.display='flex';
  show('s-game');
  // Show loading overlay until first game_state arrives
  $('game-loading').style.display='flex';
}

function pid(abs){return P[(abs-mySeat+4)%4];}


// RENDER STATE — called every time a game_state message arrives
function renderState(m){
  // Hide loading overlay on first state
  const loader=$('game-loading');
  if(loader) loader.style.display='none';
  const windChar=['東','南','西','北'];
  const dispWind=m.displayWind||m.roundWind||1;
  const dispRound=m.displayRound||m.round||1;
  $('cw').textContent=windChar[dispWind-1];
  $('ci').textContent=`Round ${dispRound}`;
  $('cwl').textContent=`${m.wallCount} tiles`;
  const h=m.honba||0,rs=m.riichiSticks||0;
  $('chonba').textContent=h||rs?`${h}本場${rs?' · '+'●'.repeat(rs):''}` :'';

  // Dora
  // Fill up to 5 fixed dora slots
  for(let di=0;di<5;di++){
    const slot=$('dora-slot-'+di);
    if(!slot) continue;
    const d=(m.dora||[])[di];
    if(d){
      slot.innerHTML='';slot.className='dora-slot filled';
      slot.appendChild(mkElDora(d));
    } else {
      slot.innerHTML='';slot.className='dora-slot';
    }
  }
  $('dora-panel').style.display='flex';
  $('dora-panel').style.flexDirection='column';

  // Scores in centre panel (compass layout: b=bottom=me, t=top, l=left, r=right)
  // P = ['b','r','t','l'], indexed by (abs - mySeat + 4) % 4
  const ctrIds={b:'ctr-s-b',r:'ctr-s-r',t:'ctr-s-t',l:'ctr-s-l'};
  const windLabels=['東','南','西','北'];
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4,id=P[i];
    if(m.scores?.[abs]!==undefined){
      const ctrEl=$(ctrIds[id]);
      if(ctrEl) ctrEl.textContent=m.scores[abs];
    }
    $('np'+id).classList.toggle('active',m.turn===abs);
    if(m.riichi?.[abs]) $('rs'+id).style.display='';
    // Seat wind: server sends seatWinds[absIndex] = wind index (0=East..3=North)
    if(m.seatWinds){
      const wb=$('wb'+id);
      if(wb) wb.textContent=windLabels[m.seatWinds[abs]];
    }
  }

  // Status bar
  const mine=m.turn===mySeat,react=m.pending?.isForMe;
  const si=$('tst');
  si.className=m.turn===mySeat||react?'tb-st my':'tb-st';
  si.textContent=($('pn'+pid(m.turn))?.textContent||'—')+"'s turn";

  // My hand — server sends mainHand (13 tiles) and drawTile separately
  const hc=$('hdb');hc.innerHTML='';
  const mainHand=m.myHand||[];
  const drawTile=m.drawTile||null;
  // Clear selId if selected tile no longer in hand (e.g. after meld)
  const allTileIds=new Set([...mainHand.map(t=>t.id),...(drawTile?[drawTile.id]:[])]);
  if(selId!=null&&!allTileIds.has(selId)) selId=null;
  const root=document.documentElement;
  const tw=parseInt(root.style.getPropertyValue('--tlg-w'))||40;
  const th=parseInt(root.style.getPropertyValue('--tlg-h'))||56;
  mainHand.forEach(t=>{
    const el=mkEl(t,'tlg',tw,th);
    if(mine) el.classList.add('play');
    if(t.id===selId) el.classList.add('sel');
    el.dataset.tid=t.id;
    if(mine) el.onclick=()=>clickTile(t.id);
    hc.appendChild(el);
  });
  if(drawTile&&mine){
    // Separator gap between main hand and draw tile
    const sep=document.createElement('div');sep.className='draw-sep';hc.appendChild(sep);
    const el=mkEl(drawTile,'tlg',tw,th);
    el.classList.add('play','drw');
    el.dataset.tid=drawTile.id;
    el.onclick=()=>clickTile(drawTile.id);
    hc.appendChild(el);
  }

  // Opponent hands — back tiles
  // top: rot180. left/right: now column-layout rotated in CSS, tiles horizontal
  [[1,'r'],[2,'t'],[3,'l']].forEach(([i,id])=>{
    const abs=(mySeat+i)%4;
    const hd=$('hd'+id);
    if(!hd) return;
    hd.innerHTML='';
    const cnt=m.oppHandSizes?.[abs];
    if(cnt==null||cnt<=0) return;
    for(let j=0;j<Math.min(cnt,16);j++){
      const b=document.createElement('div');
      b.className='tile tsm';
      hd.appendChild(b);
    }
  });

  // Discards — 6 tiles per row, riichi tile rotated 90° from player's perspective
  const dzMap={b:'dzb',r:'dzr',t:'dzt',l:'dzl'};
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4,id=P[i];
    const dz=$(dzMap[id]);dz.innerHTML='';
    const tiles=m.discards?.[abs]||[];
    let row=null;
    tiles.forEach((t,idx)=>{
      if(idx%6===0){
        row=document.createElement('div');
        row.className='dz-row';
        dz.appendChild(row);
      }
      const el=mkElMd(t);
      if(t.riichi){
        // Wrap in a rotated container — the 90° rotation is in player's own perspective
        // CSS class handles the rotation; margin compensates for size change
        el.classList.add('dz-riichi');
      }
      row.appendChild(el);
    });
  }

  // My melds — Japanese style: called tile rotated 90°, position depends on fromSeat
  const ml=$('mlb');ml.innerHTML='';
  for(const meld of(m.myMelds||[])){
    const g=document.createElement('div');g.className='mg';
    renderMeld(g, meld, mySeat);
    ml.appendChild(g);
  }
  // Opponent melds
  [[1,'r'],[2,'t'],[3,'l']].forEach(([i,id])=>{
    const abs=(mySeat+i)%4;
    const ml2=$('ml'+id);
    if(!ml2) return;
    ml2.innerHTML='';
    for(const meld of(m.melds?.[abs]||[])){
      const g=document.createElement('div');g.className='mg';
      renderMeld(g,meld,abs);
      ml2.appendChild(g);
    }
  });

  $('tpb').style.display=(m.waits?.length>0&&!m.riichi?.[mySeat]&&!m.furiten)?'':'none';
  let furitenEl=$('furiten-badge');
  if(!furitenEl){
    furitenEl=document.createElement('span');
    furitenEl.id='furiten-badge';
    furitenEl.style.cssText='display:none;padding:2px 6px;border-radius:4px;background:linear-gradient(135deg,#444,#222);color:#f88;font-size:8px;letter-spacing:1px;font-family:"Cinzel Decorative",serif;margin-left:3px;';
    furitenEl.textContent='振聴';
    $('tpb').parentNode.appendChild(furitenEl);
  }
  furitenEl.style.display=m.furiten?'':'none';
  drawActions(m);
}

function clickTile(id){
  console.log('[clickTile] id=',id,'selId=',selId,'mySeat=',mySeat,'inGame=',inGame,'turn=',lastState?.turn);
  if(selId===id){
    console.log('[clickTile] -> discard');
    wss({type:'action',action:{type:'discard',tileId:id}});
    selId=null;
  } else {
    selId=id;
    $('hdb').querySelectorAll('.tlg').forEach(el=>{
      el.classList.toggle('sel',parseInt(el.dataset.tid)===id);
    });
    drawActions(lastState);
  }
}


// MELD RENDERING
// Draws chi/pon/kan groups with correct orientation per player
function renderMeld(container, meld, viewerSeat){
  const tiles = meld.tiles;
  const calledId = meld.calledTileId;
  const fromSeat = meld.fromSeat;
  const dir = fromSeat !== undefined ? (fromSeat - viewerSeat + 4) % 4 : 1;
  const mkC = t => { const el=mkElMd(t); el.classList.add('called'); return el; };

  if(meld.type === 'chi'){
    const called = tiles.find(t=>t.id===calledId) || tiles[0];
    const own = tiles.filter(t=>t.id!==calledId);
    container.appendChild(mkC(called));
    own.forEach(t=>container.appendChild(mkElMd(t)));

  } else if(meld.type === 'pon'){
    const called = tiles.find(t=>t.id===calledId) || tiles[2];
    const own = tiles.filter(t=>t.id!==calledId);
    const ownEls = own.map(t=>mkElMd(t));
    const calledEl = mkC(called);
    if(dir===1){ container.appendChild(calledEl); ownEls.forEach(el=>container.appendChild(el)); }
    else if(dir===2){ container.appendChild(ownEls[0]); container.appendChild(calledEl); container.appendChild(ownEls[1]); }
    else { ownEls.forEach(el=>container.appendChild(el)); container.appendChild(calledEl); }

  } else if(meld.type === 'kan'){
    const kanType = meld.kanType;
    if(kanType === 'ankan'){
      const back = () => { const d=document.createElement('div'); d.className='kan-back'; return d; };
      container.appendChild(back());
      container.appendChild(mkElMd(meld.tiles[1]));
      container.appendChild(mkElMd(meld.tiles[2]));
      container.appendChild(back());

    } else if(kanType === 'kakan'){
      const kakanAdded = meld.tiles[3];
      const ponCalled = tiles.find(t=>t.id===calledId) || meld.tiles[2];
      const ponOwn = tiles.filter(t=>t.id!==calledId&&t!==kakanAdded);
      const stack = document.createElement('div');
      stack.className = 'called-stack';
      const baseEl = mkElMd(ponCalled); baseEl.classList.add('kakan-base');
      const addEl = kakanAdded ? mkElMd(kakanAdded) : mkElMd(meld.tiles[3]); addEl.classList.add('kakan-add');
      stack.appendChild(baseEl); stack.appendChild(addEl);
      const ownEls = ponOwn.map(t=>mkElMd(t));
      if(dir===1){ container.appendChild(stack); ownEls.forEach(el=>container.appendChild(el)); }
      else if(dir===2){ container.appendChild(ownEls[0]); container.appendChild(stack); if(ownEls[1]) container.appendChild(ownEls[1]); }
      else { ownEls.forEach(el=>container.appendChild(el)); container.appendChild(stack); }

    } else {
      const called = tiles.find(t=>t.id===calledId) || tiles[3];
      const own = tiles.filter(t=>t.id!==calledId);
      const ownEls = own.map(t=>mkElMd(t));
      const calledEl = mkC(called);
      if(dir===1){ container.appendChild(calledEl); ownEls.forEach(el=>container.appendChild(el)); }
      else if(dir===2){ container.appendChild(ownEls[0]); container.appendChild(calledEl); ownEls.slice(1).forEach(el=>container.appendChild(el)); }
      else { ownEls.forEach(el=>container.appendChild(el)); container.appendChild(calledEl); }
    }
  } else {
    tiles.forEach(t=>container.appendChild(mkElMd(t)));
  }
}


// ACTION BAR — buttons shown on player's turn
function drawActions(m){
  const bar=$('actbar');bar.innerHTML='';
  if(!m) return;
  bar.className='act-overlay';
  const mine=m.turn===mySeat, react=m.pending?.isForMe;
  

  if(mine){
    // TSUMO — server confirms winning hand with yaku
    if(m.canTsumo)
      ab(bar,'TSUMO','btsu',()=>wss({type:'action',action:{type:'tsumo'}}));

    // ANKAN — closed kan: 4 tiles in hand (shown regardless of selection)
    const canAnkan=m.canAnkan||[];
    if(canAnkan.length>0){
      // If multiple ankan possible, show one button per unique tile key
      canAnkan.forEach(tileKey=>{
        ab(bar,'ANKAN','bkan',()=>wss({type:'action',action:{type:'ankan',tileKey}}));
      });
    }

    // KAKAN — add to existing pon: show when matching tile selected or only one option
    const canKakan=m.canKakan||[];
    if(canKakan.length>0){
      if(selId&&canKakan.includes(selId)){
        ab(bar,'KAN','bkan',()=>wss({type:'action',action:{type:'kakan',tileId:selId}}));
      } else if(canKakan.length===1&&!selId){
        ab(bar,'KAN','bkan',()=>wss({type:'action',action:{type:'kakan',tileId:canKakan[0]}}));
      }
    }

    // RIICHI — selected tile must be in canRiichi list
    const canRiichi=m.canRiichi||[];
    if(canRiichi.length>0&&selId&&canRiichi.includes(selId))
      ab(bar,'RIICHI','brii',()=>{wss({type:'action',action:{type:'riichi',tileId:selId}});selId=null;});

    // DISCARD — tile selected
    if(selId)
      ab(bar,'DISCARD','bdis',()=>{wss({type:'action',action:{type:'discard',tileId:selId}});selId=null;});

    if(bar.children.length>0) bar.classList.add('visible');
    else bar.classList.remove('visible');

  } else if(react){
    const opts=m.pending.options||[];
    if(opts.some(o=>o.type==='ron'))
      ab(bar,'RON','bron',()=>wss({type:'action',action:{type:'ron'}}));
    if(opts.some(o=>o.type==='pon'))
      ab(bar,'PON','bpon',()=>wss({type:'action',action:{type:'pon'}}));
    // Daiminkan (called kan from discard)
    if(opts.some(o=>o.type==='kan'))
      ab(bar,'KAN','bkan',()=>wss({type:'action',action:{type:'kan'}}));
    if(opts.some(o=>o.type==='chi')){
      const c=opts.find(o=>o.type==='chi');
      ab(bar,'CHI','bchi',()=>wss({type:'action',action:{type:'chi',tileIds:c.sequences[0]}}));
    }
    ab(bar,'SKIP','bpas',()=>wss({type:'action',action:{type:'pass'}}));
    bar.classList.add('visible');

  } else {
    bar.classList.remove('visible');
  }
}

function ab(c,l,cls,fn){const b=document.createElement('button');b.className='ba '+cls;b.textContent=l;b.onclick=fn;c.appendChild(b);}
function hint(c,t){const h=document.createElement('span');h.className='hint';h.textContent=t;c.appendChild(h);}

function mkEl(tile,cls,w,h){
  const el=document.createElement('div');el.className='tile '+cls;
  // If w/h not provided, read from CSS vars
  const root=document.documentElement;
  if(!w) w=parseInt(root.style.getPropertyValue('--tmd-w'))||26;
  if(!h) h=parseInt(root.style.getPropertyValue('--tmd-h'))||36;
  const svgStr=tsvg(tile,w,h);
  el.innerHTML=svgStr?svgStr.replace('<svg ','<svg style="pointer-events:none" '):'';
  return el;
}
function mkElMd(tile){
  const r=document.documentElement;
  const w=parseInt(r.style.getPropertyValue('--tmd-w'))||26;
  const h=parseInt(r.style.getPropertyValue('--tmd-h'))||36;
  return mkEl(tile,'tmd',w,h);
}
function mkElDora(tile){
  const r=document.documentElement;
  const w=parseInt(r.style.getPropertyValue('--tlg-w'))||46;
  const h=parseInt(r.style.getPropertyValue('--tlg-h'))||64;
  return mkEl(tile,'tdora',w,h);
}


// CHAT
const SEAT_COLORS=['#ffdd44','#ff8844','#44ddff','#88ff88'];
let chatOpen=false, unreadCount=0;

function toggleChat(){
  chatOpen=!chatOpen;
  $('chat-panel').classList.toggle('open',chatOpen);
  $('chat-hist-btn').classList.toggle('open',chatOpen);
  if(chatOpen){
    unreadCount=0;
    const badge=$('chat-badge');
    badge.classList.remove('show');
    badge.textContent='0';
    const h=$('chat-history');
    h.scrollTop=h.scrollHeight;
  }
}

function sendChat(){
  const inp=$('chat-input');
  const text=inp.value.trim();
  if(!text) return;
  wss({type:'chat',text});
  inp.value='';
}

function showChatMsg(seat,name,text){
  const relSeat=(seat-mySeat+4)%4;
  const color=SEAT_COLORS[relSeat]||'#fff';

  // ── Floating big message — top of mat, centred ──
  const cf=$('chat-float');
  cf.className='chat-float';
  const div=document.createElement('div');
  div.className='chat-msg';
  div.style.color=color;
  div.innerHTML=`<span class="chat-who">${escHtml(name)}</span>${escHtml(text)}`;
  div.style.whiteSpace='nowrap';
  cf.appendChild(div);
  setTimeout(()=>div.remove(),5200);

  // ── History entry ──
  const history=$('chat-history');
  const now=new Date();
  const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const entry=document.createElement('div');
  entry.className='chat-entry';
  entry.innerHTML=
    `<span class="chat-entry-who" style="color:${color}">${escHtml(name)}</span>`+
    `<span class="chat-entry-text">${escHtml(text)}</span>`+
    `<span class="chat-entry-time">${time}</span>`;
  history.appendChild(entry);
  history.scrollTop=history.scrollHeight;

  // ── Unread badge ──
  if(!chatOpen){
    unreadCount++;
    const badge=$('chat-badge');
    badge.textContent=unreadCount;
    badge.classList.add('show');
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}


// NOTIFICATIONS — riichi announcements, toasts
function onRiichi(m){
  $('rs'+pid(m.seat)).style.display='';
  const label=m.isDouble?'ダブルリーチ':'リーチ';
  toast(label+' — '+(m.name||'Player'));
}
function toast(msg){
  const tc=$('tc'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  tc.appendChild(t);setTimeout(()=>t.remove(),3000);
}


// ROUND LIFECYCLE — start / end / game over
function onRoundStart(m){
  inGame=true;
  show('s-game');
  $('chat-bar').style.display='flex';
  $('dora-panel').style.display='flex';
  // Show loading overlay until next game_state arrives
  const loader=$('game-loading');
  if(loader) loader.style.display='flex';

  // ── Update seat winds based on new dealer ────────────────────────────────
  const windLabels2=['東','南','西','北'];
  const dealer=m.dealer??0;
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4, id=P[i];
    const wb=$('wb'+id);
    if(wb) wb.textContent=windLabels2[(abs-dealer+4)%4];
  }

  // ── Full board reset ──────────────────────────────────────────────────────
  // Clear all hand tiles
  $('hdb').innerHTML='';
  $('hdt').innerHTML='';
  $('hdl').innerHTML='';
  $('hdr').innerHTML='';
  // Clear all meld tiles
  $('mlb').innerHTML='';
  $('mlt').innerHTML='';
  $('mll').innerHTML='';
  $('mlr').innerHTML='';
  // Clear all discard zones
  ['dzb','dzt','dzl','dzr'].forEach(id=>{ const el=$(id); if(el) el.innerHTML=''; });
  // Clear riichi sticks
  ['b','r','t','l'].forEach(p=>{ const el=$('rs'+p); if(el) el.style.display='none'; });
  // Clear dora panel
  const doraPanel=$('dora-panel');
  if(doraPanel) doraPanel.querySelectorAll('.dora-slot').forEach(s=>{s.innerHTML='';s.className='dora-slot';});
  // Clear action bar
  const bar=$('actbar'); if(bar) bar.innerHTML='';
  // Clear selection
  selId=null;

  // ── Round announcement ────────────────────────────────────────────────────
  const windChar=['東','南','西','北'];
  const wind=m.displayWind||m.roundWind||1;
  const rnd=m.displayRound||m.round||1;
  toast(windChar[wind-1]+rnd+'局 · '+(m.honba||0)+'本場 開始');
}

function onGameOver(m){
  inGame=false;
  $('chat-bar').style.display='none';$('chat-panel').classList.remove('open');chatOpen=false;
  $('dora-panel').style.display='none';
  const sorted=[...((m.scores||[]).map((s,i)=>({s,i})))].sort((a,b)=>b.s-a.s);
  let rows='';
  sorted.forEach(({s,i},rank)=>{
    const name=i===mySeat?'⭐ '+($('iname').value.trim()||'You'):(m.playerNames?.[i]||`Seat ${i}`);
    rows+=`<tr class="${rank===0?'w':''}"><td>${rank+1}位 ${W[i]} ${escHtml(name)}</td><td>${s}</td></tr>`;
  });
  $('ret').textContent=m.reason==='tobi'?'飛び — Bankruptcy':'終局 — Game Over';
  $('rehn').textContent='';$('reyl').innerHTML='';$('rewt').innerHTML='';
  $('rest').innerHTML=rows;
  show('s-end');
}

function onEnd(m){
  inGame=false;
  $('chat-bar').style.display='none';$('chat-panel').classList.remove('open');chatOpen=false;
  $('dora-panel').style.display='none';
  const reasonLabels={tsumo:'🀄 TSUMO!',ron:'🀄 RON!',draw:'流局 — Draw',suukaisan:'四槓散了',nagashi:'流し満貫'};
  $('ret').textContent=reasonLabels[m.reason]||'Round Over';
  if(m.reason==='tsumo'||m.reason==='ron'){
    $('rehn').textContent=m.handLabel?`${m.handLabel} · ${m.han||0}飜${m.fu?' · '+m.fu+'符':''}` :'';
  } else if(m.reason==='draw'){
    const payStrs=(m.payments||[]).map((p,i)=>{
      const name=i===mySeat?'You':(m.playerNames?.[i]||`Seat ${i}`);
      return `${name}: ${m.inTenpai?.[i]?'テンパイ':'ノーテン'}${p!==0?' '+(p>0?'+':'')+p:''}`;
    });
    $('rehn').textContent=payStrs.join('  ·  ');
  } else { $('rehn').textContent=''; }
  const yl=$('reyl');yl.innerHTML='';
  for(const y of(m.yakuList||[])){
    const c=document.createElement('div');c.className='yc';
    c.innerHTML=`${escHtml(y.name)}<span class="yh">${y.han}飜</span><span class="yj">${escHtml(y.jp||'')}</span>`;
    yl.appendChild(c);
  }
  if((m.dora||[]).length||(m.uraDora||[]).length){
    const dr=document.createElement('div');dr.style.cssText='display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;';
    if((m.dora||[]).length){const lbl=document.createElement('span');lbl.style.cssText='font-size:10px;color:var(--gold);letter-spacing:1px;margin-right:4px;';lbl.textContent='ドラ';dr.appendChild(lbl);for(const t of m.dora) dr.appendChild(mkElMd(t));}
    if((m.uraDora||[]).length){const lbl2=document.createElement('span');lbl2.style.cssText='font-size:10px;color:#f88;letter-spacing:1px;margin-left:8px;margin-right:4px;';lbl2.textContent='裏ドラ';dr.appendChild(lbl2);for(const t of m.uraDora) dr.appendChild(mkElMd(t));}
    yl.appendChild(dr);
  }
  const wt=$('rewt');wt.innerHTML='';
  for(const t of(m.hand||[])) if(t) wt.appendChild(mkElMd(t));
  const tbl=$('rest');tbl.innerHTML='';
  (m.scores||[]).forEach((sc,seat)=>{
    const name=seat===mySeat?'⭐ '+($('iname').value.trim()||'You'):(m.playerNames?.[seat]||`Seat ${seat}`);
    const row=document.createElement('tr');if(seat===m.winner)row.className='w';
    row.innerHTML=`<td>${W[seat]} ${escHtml(name)}</td><td>${sc}</td>`;
    tbl.appendChild(row);
  });
  show('s-end');
  setTimeout(()=>{ inGame=true; },5500);
}



// RESPONSIVE TILE SIZING
// Recalculates --tlg/tmd/tsm CSS vars on window resize
function updateTileSizes(){
  const vmin=Math.min(window.innerWidth,window.innerHeight);
  // Large tiles: target ~6.5% of vmin each, capped for desktop
  const lgW=Math.round(Math.min(vmin*0.066,46));
  const lgH=Math.round(lgW*1.38);
  // Medium tiles (discards): ~60% of large
  const mdW=Math.round(lgW*0.63);
  const mdH=Math.round(lgH*0.63);
  // Small tiles (opponent backs): ~65% of large
  const smW=Math.round(lgW*0.65);
  const smH=Math.round(lgH*0.65);
  const root=document.documentElement;
  root.style.setProperty('--tlg-w',lgW+'px');
  root.style.setProperty('--tlg-h',lgH+'px');
  root.style.setProperty('--tmd-w',mdW+'px');
  root.style.setProperty('--tmd-h',mdH+'px');
  root.style.setProperty('--tsm-w',smW+'px');
  root.style.setProperty('--tsm-h',smH+'px');
}
window.addEventListener('resize',updateTileSizes);
updateTileSizes();
