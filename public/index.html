<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --jade:#1a6b45;--jl:#2a9e67;--jd:#0d3d28;
  --gold:#c9a84c;--gl:#f0d080;--gd:#8a6b20;--cream:#f5edd8;
  /* Responsive tile sizes via CSS vars — JS updates these on resize */
  --tlg-w:40px;--tlg-h:56px;
  --tmd-w:26px;--tmd-h:36px;
  --tsm-w:16px;--tsm-h:22px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:#060c07;color:var(--cream);font-family:'Noto Sans JP',sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 85%,rgba(26,107,69,.3),transparent 55%),radial-gradient(ellipse at 80% 15%,rgba(201,168,76,.14),transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(12,35,20,.85),#040a05 100%);}
.bgg{position:fixed;inset:0;z-index:0;opacity:.03;background-image:repeating-linear-gradient(0deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 40px),repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 40px);}
.screen{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;}
.screen.hidden{display:none!important;}

/* ════ LOBBY ════ */
#s-lobby{flex-direction:column;gap:18px;}
.logo{text-align:center;animation:float 5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-k{font-family:'Noto Serif JP',serif;font-size:clamp(40px,10vw,72px);font-weight:900;letter-spacing:clamp(4px,2vw,12px);
  background:linear-gradient(135deg,#ffe680,#c9a84c,#8a6b20);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 24px rgba(201,168,76,.7));}
.logo-s{font-family:'Cinzel Decorative',serif;font-size:clamp(10px,2.5vw,14px);color:var(--jl);letter-spacing:clamp(3px,1.5vw,8px);margin-top:2px;}
.card{background:linear-gradient(155deg,rgba(20,55,35,.95),rgba(8,20,12,.98));border:1px solid rgba(201,168,76,.35);border-radius:16px;
  padding:clamp(20px,4vw,34px) clamp(18px,5vw,46px);width:min(440px,96vw);
  box-shadow:0 0 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,168,76,.25);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.card h2{font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:5px;color:var(--gold);opacity:.75;margin-bottom:18px;text-align:center;}
.ig{margin-bottom:16px;}.ig label{display:block;font-size:10px;letter-spacing:3px;color:var(--gold);opacity:.65;margin-bottom:6px;text-transform:uppercase;}
.ig input{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:11px 14px;color:var(--cream);font-size:16px;outline:none;transition:border-color .3s;font-family:'Noto Sans JP',sans-serif;}
.ig input:focus{border-color:var(--jl);}
.bp{width:100%;padding:13px;background:linear-gradient(135deg,var(--jade),var(--jd));border:1px solid var(--jl);border-radius:10px;color:var(--cream);font-size:13px;font-family:'Cinzel Decorative',serif;letter-spacing:3px;cursor:pointer;transition:all .25s;}
.bp:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(26,107,69,.55);border-color:var(--gold);}
.bp:disabled{opacity:.4;cursor:default;transform:none;}
.bs{width:100%;padding:10px;background:transparent;border:1px solid rgba(201,168,76,.3);border-radius:10px;color:rgba(245,237,216,.65);font-size:12px;font-family:'Cinzel Decorative',serif;letter-spacing:3px;cursor:pointer;transition:all .25s;margin-top:8px;}
.bs:hover{border-color:var(--gold);color:var(--gl);}
.wa{display:none;margin-top:14px;}
.wm{text-align:center;color:var(--jl);font-size:12px;letter-spacing:2px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.slots{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.slot{width:80px;min-height:64px;border-radius:10px;border:2px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;background:rgba(0,0,0,.4);transition:all .4s;padding:6px 4px;}
.slot .si{font-size:20px;line-height:1;}.slot .sn{font-size:9px;color:rgba(245,237,216,.7);font-weight:600;}.slot .sr{font-size:8px;margin-top:2px;}
.slot.filled{border-color:var(--jl);background:rgba(26,107,69,.25);}
.slot.bot{border-color:rgba(201,168,76,.35);background:rgba(50,35,5,.4);}
.slot.rdy{border-color:#4eff9a;box-shadow:0 0 14px rgba(78,255,154,.3);}
.cd{font-size:10px;color:rgba(201,168,76,.55);text-align:center;margin-top:8px;letter-spacing:1px;}
.ready-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0a5a2a,#1a8840);border:2px solid #4eff9a;border-radius:10px;color:#c0ffd8;font-size:14px;font-family:'Cinzel Decorative',serif;letter-spacing:3px;cursor:pointer;transition:all .25s;margin-top:12px;position:relative;overflow:hidden;}
.ready-btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(78,255,154,.4);}
.ready-btn.pressed{opacity:.6;cursor:default;transform:none;}
.ready-btn.pressed::after{content:'✓ Ready!';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a5a2a,#1a8840);font-size:14px;letter-spacing:3px;}

/* ════ GAME LAYOUT ════ */
#s-game{display:block;}
.topbar{position:fixed;top:0;left:0;right:0;height:36px;background:rgba(3,10,5,.97);border-bottom:1px solid rgba(201,168,76,.18);display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:50;}
.tb-title{font-family:'Noto Serif JP',serif;font-size:12px;color:var(--gold);letter-spacing:2px;}
.tb-st{font-size:11px;color:rgba(245,237,216,.5);max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-st.my{color:#ffdd44;font-weight:700;animation:pulse 1s infinite;}
.bl{padding:0 10px;height:26px;background:rgba(120,20,20,.8);border:1px solid rgba(200,60,60,.4);border-radius:6px;color:rgba(255,180,180,.85);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;}
.bl:hover{background:rgba(160,30,30,.9);}

/* Table area between top bar and action bar */
.table{position:fixed;top:36px;left:0;right:0;bottom:52px;overflow:hidden;}

/* Felt — responsive square using vmin */
.felt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(56vmin,460px);height:min(56vmin,460px);
  background:radial-gradient(ellipse at 40% 35%,#27774a,#155230 60%,#0e3b24);
  border-radius:14px;border:3px solid rgba(201,168,76,.5);
  box-shadow:0 0 0 6px rgba(0,0,0,.5),0 0 80px rgba(0,0,0,.9),inset 0 0 50px rgba(0,0,0,.4);}

/* Center info */
.ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:5;pointer-events:none;
  background:rgba(0,0,0,.55);border-radius:10px;padding:8px 12px;border:1px solid rgba(201,168,76,.2);
  min-width:80px;}
.cw{font-family:'Noto Serif JP',serif;font-size:clamp(20px,5vmin,30px);font-weight:900;color:var(--gl);filter:drop-shadow(0 0 8px rgba(201,168,76,.7));line-height:1;}
.ci{font-size:clamp(7px,1.5vmin,9px);letter-spacing:2px;color:rgba(245,237,216,.4);margin-top:1px;}
.cwl{font-size:clamp(9px,2vmin,11px);color:var(--jl);font-weight:700;margin-top:3px;}
.ch{font-size:clamp(7px,1.5vmin,9px);color:rgba(245,237,216,.35);margin-top:1px;}
.cdora{margin-top:5px;}.cdlbl{font-size:7px;letter-spacing:2px;color:rgba(201,168,76,.5);margin-bottom:2px;}.cdrow{display:flex;gap:2px;justify-content:center;}
.tarrow{position:absolute;bottom:max(88px,11vmin);left:50%;transform:translateX(-50%);font-size:clamp(14px,3vmin,20px);z-index:20;pointer-events:none;filter:drop-shadow(0 0 6px rgba(255,220,50,.9));animation:bounce .7s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* Discard zones — positioned relative to felt center using vmin */
.dz{position:absolute;display:flex;flex-wrap:wrap;gap:1px;align-content:flex-start;}
.dzb{bottom:max(90px,12vmin);left:50%;transform:translateX(-50%);width:min(145px,30vmin);justify-content:center;}
.dzt{top:max(90px,12vmin);left:50%;transform:translateX(-50%) rotate(180deg);width:min(145px,30vmin);justify-content:center;}
.dzl{left:max(90px,12vmin);top:50%;transform:translateY(-50%) rotate(90deg);width:min(110px,22vmin);}
.dzr{right:max(90px,12vmin);top:50%;transform:translateY(-50%) rotate(-90deg);width:min(110px,22vmin);}

/* Player areas */
.pa{position:absolute;display:flex;align-items:center;z-index:15;}
.pa-b{bottom:0;left:0;right:0;flex-direction:column;padding-bottom:2px;justify-content:flex-end;align-items:center;}
.pa-t{top:0;left:0;right:0;flex-direction:column-reverse;padding-top:2px;align-items:center;}
.pa-l{left:0;top:0;bottom:0;flex-direction:row;padding-left:2px;align-items:center;}
.pa-r{right:0;top:0;bottom:0;flex-direction:row-reverse;padding-right:2px;align-items:center;}

/* Nameplates */
.np{background:rgba(5,15,8,.95);border:2px solid rgba(201,168,76,.25);border-radius:8px;
  padding:4px 9px;display:flex;align-items:center;gap:6px;
  z-index:20;transition:all .25s;flex-shrink:0;white-space:nowrap;}
.np.active{background:rgba(8,32,16,.97);border-color:#ffdd44;
  box-shadow:0 0 0 2px rgba(255,221,68,.3),0 0 16px rgba(255,221,68,.5);animation:glow 1s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px rgba(255,221,68,.3),0 0 14px rgba(255,221,68,.4);}50%{box-shadow:0 0 0 3px rgba(255,221,68,.55),0 0 28px rgba(255,221,68,.7);}}
.wb{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:900;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(201,168,76,.18);color:var(--gl);border:1px solid rgba(201,168,76,.45);flex-shrink:0;}
.pname{font-size:10px;font-weight:700;color:#fff;max-width:70px;overflow:hidden;text-overflow:ellipsis;}
.pscore{font-size:9px;color:var(--gl);}
.btag{font-size:7px;color:rgba(201,168,76,.5);}
.rs{display:inline-block;width:4px;height:22px;background:linear-gradient(180deg,#fff,#ddd);border-radius:3px;border:1px solid #bbb;margin-left:3px;}
.tenpai{display:inline-block;padding:2px 6px;border-radius:4px;background:linear-gradient(135deg,#6a0f0f,#c02020);color:#fff;font-size:8px;letter-spacing:1px;font-family:'Cinzel Decorative',serif;animation:pulse 1s infinite;margin-left:3px;}

/* ── TILES ──
   All sizes driven by CSS vars set dynamically by JS on resize.
   This makes everything scale to fit any screen. */
.tile{position:relative;display:inline-flex;align-items:center;justify-content:center;cursor:default;flex-shrink:0;overflow:hidden;}

.tlg{
  width:var(--tlg-w);height:var(--tlg-h);border-radius:5px;
  background:linear-gradient(170deg,#fffdf4,#f8edd8);
  border:1px solid #c8a84a;border-bottom:3px solid #7a5c10;
  box-shadow:2px 3px 8px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.95);
  transition:transform .12s ease,box-shadow .12s ease;}
.tlg.play{cursor:pointer;}
.tlg.play:hover,.tlg.play:active{transform:translateY(-10px);box-shadow:2px 12px 18px rgba(0,0,0,.7),inset 0 2px 0 rgba(255,255,255,.95);z-index:20;}
.tlg.sel{transform:translateY(-16px);box-shadow:0 0 0 3px #00ffaa,2px 18px 24px rgba(0,0,0,.75);z-index:25;}

/* Draw tile — far right, taller glow, shimmer animation */
.tlg.drw{
  border-color:#ffe066;
  box-shadow:2px 3px 8px rgba(0,0,0,.6),
    0 0 0 2px rgba(255,220,50,.7),
    0 0 20px rgba(255,200,0,.8),
    0 0 40px rgba(201,168,76,.5),
    inset 0 2px 0 rgba(255,255,255,.95);
  animation:drawShimmer 1.2s ease-in-out infinite;
  z-index:5;}
@keyframes drawShimmer{
  0%,100%{box-shadow:2px 3px 8px rgba(0,0,0,.6),0 0 0 2px rgba(255,220,50,.7),0 0 16px rgba(255,200,0,.7),inset 0 2px 0 rgba(255,255,255,.95);}
  50%{box-shadow:2px 3px 8px rgba(0,0,0,.6),0 0 0 3px rgba(255,220,50,1),0 0 30px rgba(255,200,0,1),0 0 50px rgba(201,168,76,.7),inset 0 2px 0 rgba(255,255,255,.95);}
}

.tmd{
  width:var(--tmd-w);height:var(--tmd-h);border-radius:3px;
  background:linear-gradient(170deg,#fffdf4,#f8edd8);
  border:1px solid #c8a84a;border-bottom:2px solid #7a5c10;
  box-shadow:1px 2px 4px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.9);
  display:inline-flex;align-items:center;justify-content:center;}
.tsm{
  width:var(--tsm-w);height:var(--tsm-h);border-radius:3px;
  background:linear-gradient(145deg,#1a5c70,#0e3a48);
  border:1px solid #3a90aa;box-shadow:1px 2px 4px rgba(0,0,0,.5);
  flex-shrink:0;position:relative;}
.tsm::before{content:'';position:absolute;inset:2px;border:1px solid rgba(255,255,255,.12);border-radius:2px;}
.tsm.rot{width:var(--tsm-h);height:var(--tsm-w);}
.tdora{width:calc(var(--tmd-w) - 2px);height:calc(var(--tmd-h) - 2px);border-radius:3px;
  background:linear-gradient(170deg,#fffdf4,#f8edd8);border:1px solid #c8a84a;border-bottom:2px solid #7a5c10;
  box-shadow:1px 2px 4px rgba(0,0,0,.5);display:inline-flex;align-items:center;justify-content:center;}

/* Hand layout */
.hr{display:flex;align-items:flex-end;gap:2px;flex-wrap:nowrap;}
/* Gap between main hand and draw tile */
.draw-sep{width:clamp(5px,1.5vmin,10px);flex-shrink:0;}
.mg{display:flex;gap:1px;margin-right:3px;}
.mr{display:flex;gap:2px;align-items:flex-end;flex-shrink:0;}
.oh{display:flex;gap:2px;}
.oh.rot180{transform:rotate(180deg);}
.oh.v{flex-direction:column;}

/* ── Action bar ── */
.actbar{position:fixed;bottom:0;left:0;right:0;height:52px;background:rgba(2,8,4,.97);border-top:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;gap:8px;z-index:60;padding:0 8px;overflow-x:auto;}
.ba{padding:0 clamp(8px,2vw,18px);height:36px;border:none;border-radius:8px;font-family:'Cinzel Decorative',serif;font-size:clamp(9px,2vw,11px);letter-spacing:1px;cursor:pointer;transition:all .15s;font-weight:700;white-space:nowrap;flex-shrink:0;}
.ba:hover{filter:brightness(1.2);transform:translateY(-2px);}.ba:active{transform:translateY(0);}.ba:disabled{opacity:.3;cursor:default;transform:none;filter:none;}
.hint{padding:0 10px;height:36px;border-radius:8px;font-size:clamp(9px,2vw,11px);background:rgba(20,20,20,.8);color:rgba(245,237,216,.45);border:1px solid rgba(255,255,255,.1);font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;white-space:nowrap;}
.bdis{background:linear-gradient(135deg,#7a1515,#b82020);color:#ffd8d8;border:2px solid #d44;}
.btsu{background:linear-gradient(135deg,#805500,#c9a020);color:#150a00;border:2px solid #f0d060;font-weight:900;}
.brii{background:linear-gradient(135deg,#18186e,#3030b8);color:#d0d0ff;border:2px solid #77f;}
.bron{background:linear-gradient(135deg,#880f0f,#d42020);color:#fff;border:2px solid #f66;box-shadow:0 0 16px rgba(220,50,50,.5);font-weight:900;}
.bchi{background:linear-gradient(135deg,#104a10,#1a7820);color:#c0ffc0;border:2px solid #4d4;}
.bpon{background:linear-gradient(135deg,#4a2800,#8a5000);color:#ffe0b0;border:2px solid #ca0;}
.bpas{background:rgba(30,30,30,.9);color:rgba(245,237,216,.65);border:1px solid rgba(255,255,255,.15);}

/* Chat */
/* Toggle button */
.chat-toggle{position:fixed;bottom:60px;right:10px;width:36px;height:36px;
  background:rgba(26,107,69,.85);border:1px solid var(--jl);border-radius:50%;
  color:var(--cream);font-size:16px;cursor:pointer;z-index:75;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.5);transition:all .2s;}
.chat-toggle:hover{background:rgba(42,158,103,.9);}
.chat-toggle.has-unread{border-color:#ffdd44;box-shadow:0 0 10px rgba(255,221,68,.5);}

/* History panel */
.chat-panel{position:fixed;bottom:60px;right:10px;width:clamp(240px,40vw,320px);
  background:rgba(5,14,8,.96);border:1px solid rgba(201,168,76,.3);border-radius:12px;
  z-index:74;display:none;flex-direction:column;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.7);}
.chat-panel.open{display:flex;}
.chat-panel-header{padding:8px 12px;background:rgba(26,107,69,.3);border-bottom:1px solid rgba(201,168,76,.2);
  font-size:11px;letter-spacing:2px;color:var(--gold);font-family:'Cinzel Decorative',serif;
  display:flex;justify-content:space-between;align-items:center;}
.chat-close{background:none;border:none;color:rgba(245,237,216,.5);font-size:16px;cursor:pointer;line-height:1;padding:0 2px;}
.chat-close:hover{color:var(--cream);}
.chat-history{flex:1;overflow-y:auto;max-height:200px;padding:8px;display:flex;flex-direction:column;gap:5px;}
.chat-history::-webkit-scrollbar{width:4px;}
.chat-history::-webkit-scrollbar-track{background:transparent;}
.chat-history::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px;}
.chat-entry{display:flex;flex-direction:column;gap:1px;}
.chat-entry-who{font-size:9px;letter-spacing:1px;font-weight:700;}
.chat-entry-text{font-size:12px;color:var(--cream);background:rgba(255,255,255,.05);
  border-radius:6px;padding:4px 8px;line-height:1.4;word-break:break-word;}
.chat-entry-time{font-size:8px;color:rgba(245,237,216,.3);margin-top:1px;}
.chat-input-row{display:flex;gap:5px;padding:8px;border-top:1px solid rgba(201,168,76,.15);}
.chat-input{flex:1;padding:5px 8px;background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.2);
  border-radius:7px;color:var(--cream);font-size:12px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.chat-input:focus{border-color:var(--jl);}
.chat-send{padding:0 10px;height:28px;background:rgba(26,107,69,.7);border:1px solid var(--jl);
  border-radius:7px;color:var(--cream);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.chat-send:hover{background:rgba(42,158,103,.9);}

/* Floating big message (unchanged) */
.chat-float{position:fixed;left:50%;transform:translateX(-50%);z-index:180;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:8px;bottom:140px;width:92%;}
.chat-msg{font-family:'Noto Serif JP',serif;font-size:clamp(20px,5vw,44px);font-weight:900;
  text-shadow:0 0 20px rgba(201,168,76,.9),0 2px 8px rgba(0,0,0,.9),0 0 40px rgba(201,168,76,.5);

<script>
// ══ SVG Tile Renderer ═══════════════════════════════════════════════════════
// ══ Japanese Mahjong Tile Renderer ═══════════════════════════════════════════
// Man: large kanji + 萬 label  (red)
// Pin: concentric circle rings arranged in patterns  (blue/red)
// Sou: distinct bamboo sticks per value with unique color bands  (green + accent)
//      1-sou = special bird on stick design
// Honor: large kanji, colour-coded

const MK=['','一','二','三','四','五','六','七','八','九'];

function tsvg(t,w,h){
  if(!t) return '';
  const s=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  const e=`</svg>`;
  if(t.s==='m') return s+svgMan(t.v,w,h)+e;
  if(t.s==='p') return s+svgPin(t.v,w,h)+e;
  if(t.s==='s') return s+svgSou(t.v,w,h)+e;
  if(t.s==='z') return s+svgHon(t.v,w,h)+e;
  return '';
}

// ── Man (Characters) ─────────────────────────────────────────────────────────
// Clean kanji numeral + 萬 label, authentic red
function svgMan(v,w,h){
  const kanji=['','一','二','三','四','五','六','七','八','九'][v];
  const fs=Math.round(h*.46), sf=Math.round(h*.17);
  return `<text x="${w/2}" y="${h*.27}" text-anchor="middle" font-family="'Noto Serif JP',serif" font-size="${sf}" font-weight="700" fill="#b81c1c">萬</text>`+
         `<text x="${w/2}" y="${h*.82}" text-anchor="middle" font-family="'Noto Serif JP',serif" font-size="${fs}" font-weight="900" fill="#c02020">${kanji}</text>`;
}

// ── Pin (Circles) ─────────────────────────────────────────────────────────────
// Each circle = outer blue ring + white gap + inner red dot
// Sizes and layouts match Japanese tile conventions
function svgPin(v,w,h){
  const positions=pinPos(v,w,h);
  // Radius scales with count: fewer = bigger circles
  const base=Math.min(w,h);
  const r=base*(v===1?.30:v<=4?.185:.155);
  return positions.map(([cx,cy])=>pinCircle(cx,cy,r)).join('');
}

function pinCircle(cx,cy,r){
  const sw=Math.max(1.5,r*.32);
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#fdf0e0" stroke="#1050a0" stroke-width="${sw}"/>`+
         `<circle cx="${cx}" cy="${cy}" r="${r*.38}" fill="#c82020"/>`;
}

function pinPos(v,w,h){
  const cx=w/2,cy=h/2,dx=w*.285,dy=h*.235;
  const G={
    1:[[cx,cy]],
    2:[[cx,cy-dy*1.05],[cx,cy+dy*1.05]],
    3:[[cx,cy-dy*1.05],[cx,cy],[cx,cy+dy*1.05]],
    4:[[cx-dx,cy-dy],[cx+dx,cy-dy],[cx-dx,cy+dy],[cx+dx,cy+dy]],
    5:[[cx-dx,cy-dy],[cx+dx,cy-dy],[cx,cy],[cx-dx,cy+dy],[cx+dx,cy+dy]],
    6:[[cx-dx,cy-dy],[cx+dx,cy-dy],[cx-dx,cy],[cx+dx,cy],[cx-dx,cy+dy],[cx+dx,cy+dy]],
    7:[[cx-dx,cy-dy*1.3],[cx+dx,cy-dy*1.3],[cx-dx,cy-dy*.02],[cx+dx,cy-dy*.02],[cx,cy-dy*.66],[cx-dx,cy+dy*1.2],[cx+dx,cy+dy*1.2]],
    8:[[cx-dx,cy-dy*1.3],[cx,cy-dy*1.3],[cx+dx,cy-dy*1.3],[cx-dx,cy],[cx+dx,cy],[cx-dx,cy+dy*1.3],[cx,cy+dy*1.3],[cx+dx,cy+dy*1.3]],
    9:[[cx-dx,cy-dy*1.3],[cx,cy-dy*1.3],[cx+dx,cy-dy*1.3],[cx-dx,cy],[cx,cy],[cx+dx,cy],[cx-dx,cy+dy*1.3],[cx,cy+dy*1.3],[cx+dx,cy+dy*1.3]]
  };
  return G[v]||[];
}

// ── Sou (Bamboo) ─────────────────────────────────────────────────────────────
// Each bamboo stick is a proper segmented stalk:
//   - dark green body with lighter green highlight stripe
//   - gold/brown joint bands at top and bottom
//   - distinct height and column layout per value
// 1-sou = bird on single stick (traditional design)
function svgSou(v,w,h){
  if(v===1) return souBird(w,h);
  const positions=souPos(v,w,h);
  // Stick dimensions scale by count
  const bw=w*(v<=2?.22:v<=5?.19:.16);
  const bh=h*(v<=2?.7:v<=5?.44:v<=7?.33:.27);
  return positions.map(([rx,ry],i)=>souStick(rx,ry,bw,bh,i)).join('');
}

// Single bamboo stick at (cx,cy) — detailed with joints and highlight
function souStick(cx,cy,bw,bh,idx){
  const x=cx-bw/2, y=cy-bh/2;
  const r=bw*.3;
  // Alternate two shades of green for adjacent sticks so they're visually distinct
  const body=idx%2===0?'#1a7830':'#1d8f38';
  const hi=idx%2===0?'#26a845':'#2dbd52';
  const joint='#c8a020'; // gold band
  const jh=bh*.09; // joint band height
  return (
    // Main body
    `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="${r}" fill="${body}"/>`+
    // Highlight stripe (left edge)
    `<rect x="${x+bw*.1}" y="${y+bh*.06}" width="${bw*.22}" height="${bh*.88}" rx="${r*.4}" fill="${hi}" opacity="0.55"/>`+
    // Top joint band
    `<rect x="${x}" y="${y+bh*.1}" width="${bw}" height="${jh}" rx="1" fill="${joint}" opacity="0.85"/>`+
    // Bottom joint band
    `<rect x="${x}" y="${y+bh*.81}" width="${bw}" height="${jh}" rx="1" fill="${joint}" opacity="0.85"/>`+
    // Node dot in center
    `<circle cx="${cx}" cy="${cy}" r="${bw*.14}" fill="${joint}" opacity="0.7"/>`
  );
}

// 1-sou: single green stick + stylised bird perched on top
function souBird(w,h){
  const cx=w/2,stickX=cx-w*.08,stickW=w*.16,stickY=h*.22,stickH=h*.62,r=stickW*.35;
  const bh=stickH,bw=stickW;
  const joint='#c8a020';const jh=bh*.09;
  const stick=(
    `<rect x="${stickX}" y="${stickY}" width="${stickW}" height="${stickH}" rx="${r}" fill="#1a7830"/>`+
    `<rect x="${stickX+stickW*.1}" y="${stickY+stickH*.06}" width="${stickW*.22}" height="${stickH*.88}" rx="${r*.4}" fill="#26a845" opacity="0.55"/>`+
    `<rect x="${stickX}" y="${stickY+bh*.1}" width="${stickW}" height="${jh}" rx="1" fill="${joint}" opacity="0.85"/>`+
    `<rect x="${stickX}" y="${stickY+bh*.81}" width="${stickW}" height="${jh}" rx="1" fill="${joint}" opacity="0.7"/>`
  );
  // Bird: round body, beak, tail, eye
  const bx=cx, by=h*.18;
  const br=w*.19;
  const bird=(
    // Body
    `<ellipse cx="${bx}" cy="${by}" rx="${br}" ry="${br*.75}" fill="#c03010"/>`+
    // Wing highlight
    `<ellipse cx="${bx-br*.2}" cy="${by}" rx="${br*.65}" ry="${br*.55}" fill="#d84020" opacity="0.6"/>`+
    // Beak
    `<polygon points="${bx+br*.85},${by-br*.1} ${bx+br*1.35},${by} ${bx+br*.85},${by+br*.1}" fill="#e8a020"/>`+
    // Eye
    `<circle cx="${bx+br*.35}" cy="${by-br*.2}" r="${br*.16}" fill="#fff"/>`+
    `<circle cx="${bx+br*.38}" cy="${by-br*.18}" r="${br*.09}" fill="#111"/>`+
    // Tail
    `<polygon points="${bx-br*.9},${by-br*.1} ${bx-br*1.5},${by-br*.5} ${bx-br*.9},${by+br*.2}" fill="#b02808"/>`
  );
  return stick+bird;
}

// Column/row layout for each bamboo value
function souPos(v,w,h){
  const cx=w/2,cy=h/2;
  // dx = column spacing, dy = row spacing
  const dx=w*.32,dy=h*(v<=3?.0:v<=6?.3:.23);
  const G={
    2:[[cx,cy-dy*1.1],[cx,cy+dy*1.1]],
    3:[[cx,cy-dy*1.2],[cx,cy],[cx,cy+dy*1.2]],
    4:[[cx-dx,cy-dy],[cx+dx,cy-dy],[cx-dx,cy+dy],[cx+dx,cy+dy]],
    5:[[cx-dx,cy-dy],[cx+dx,cy-dy],[cx,cy],[cx-dx,cy+dy],[cx+dx,cy+dy]],
    6:[[cx-dx,cy-dy*1.1],[cx+dx,cy-dy*1.1],[cx-dx,cy],[cx+dx,cy],[cx-dx,cy+dy*1.1],[cx+dx,cy+dy*1.1]],
    7:[[cx-dx,cy-dy*1.4],[cx+dx,cy-dy*1.4],[cx-dx,cy-dy*.3],[cx+dx,cy-dy*.3],[cx,cy-dy*.85],[cx-dx,cy+dy*1.1],[cx+dx,cy+dy*1.1]],
    8:[[cx-dx,cy-dy*1.5],[cx+dx,cy-dy*1.5],[cx-dx,cy-dy*.45],[cx+dx,cy-dy*.45],[cx-dx,cy+dy*.55],[cx+dx,cy+dy*.55],[cx-dx,cy+dy*1.55],[cx+dx,cy+dy*1.55]],
    9:[[cx-dx,cy-dy*1.5],[cx,cy-dy*1.5],[cx+dx,cy-dy*1.5],[cx-dx,cy-dy*.3],[cx,cy-dy*.3],[cx+dx,cy-dy*.3],[cx-dx,cy+dy*.9],[cx,cy+dy*.9],[cx+dx,cy+dy*.9]]
  };
  return G[v]||[];
}

// ── Honours ───────────────────────────────────────────────────────────────────
// Winds: blue kanji.  Haku: empty bordered rect.  Hatsu: green 發.  Chun: red 中.
function svgHon(v,w,h){
  const fs=Math.round(h*.52);
  if(v===5){
    // Haku — blank rectangle border only
    const pad=w*.15;
    return `<rect x="${pad}" y="${h*.12}" width="${w-pad*2}" height="${h*.76}" rx="3" fill="none" stroke="#888" stroke-width="${Math.max(1.5,w*.05)}"/>`;
  }
  const colors={1:'#1a50a0',2:'#1a50a0',3:'#1a50a0',4:'#1a50a0',6:'#1a7a30',7:'#c02020'};
  const chars={1:'東',2:'南',3:'西',4:'北',6:'發',7:'中'};
  return `<text x="${w/2}" y="${h*.74}" text-anchor="middle" font-family="'Noto Serif JP',serif" font-size="${fs}" font-weight="900" fill="${colors[v]}">${chars[v]}</text>`;
}

// ══ App ═══════════════════════════════════════════════════════════════════════
const W=['東','南','西','北'];
// Position IDs indexed by (absSeat - mySeat + 4) % 4
// 0=bottom(me), 1=right, 2=top, 3=left
const P=['b','r','t','l'];

let ws=null, mySeat=-1, inGame=false, selId=null, lastState=null, isReady=false;

function show(id){['s-lobby','s-game','s-end'].forEach(s=>$(s).classList.toggle('hidden',s!==id));}
function $(id){return document.getElementById(id);}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect(){
  if(!location.host){
    console.warn('No server host — open via http://localhost:3000');
    return;
  }
  const url=(location.protocol==='https:'?'wss':'ws')+'://'+location.host;
  try{ ws=new WebSocket(url); } catch(e){ setTimeout(connect,3000); return; }
  ws.onopen=()=>{};
  ws.onmessage=e=>{try{onMsg(JSON.parse(e.data));}catch(ex){console.error(ex);}};
  ws.onclose=()=>{setTimeout(connect,2000);};
  ws.onerror=()=>{try{ws.close();}catch{}};
}
function wss(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));}

function onMsg(m){
  if(m.type==='hello') return;
  if(m.type==='joined'){mySeat=m.seat;showWaiting();return;}
  if(m.type==='room_update'){updateSlots(m.seats);return;}
  if(m.type==='game_start'){startGame(m);return;}
  if(!inGame) return;
  if(m.type==='game_state'){lastState=m;renderState(m);}
  else if(m.type==='riichi'){onRiichi(m);}
  else if(m.type==='round_end'){onEnd(m);}
  else if(m.type==='chat'){showChatMsg(m.seat,m.name,m.text);}
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
function findMatch(){
  wss({type:'join',name:($('iname').value.trim()||'Player')});
}

function showWaiting(){
  $('wa').style.display='block';
  $('bfind').style.display='none';
  $('cdiv').textContent='Press Ready when you are set to start';
}

function updateSlots(seats){
  $('wmsg').textContent=`${seats.filter(Boolean).length}/4 players`;
  document.querySelectorAll('.slot').forEach((sl,i)=>{
    const p=seats[i]; sl.innerHTML='';sl.className='slot';
    if(p){
      sl.classList.add('filled');
      if(p.isBot) sl.classList.add('bot');
      if(p.ready) sl.classList.add('rdy');
      const icon=p.isBot?'🤖':p.name[0].toUpperCase();
      const rdyTxt=p.isBot?'<span class="sr" style="color:#4eff9a">✓ BOT</span>':(p.ready?'<span class="sr" style="color:#4eff9a">✓ Ready</span>':'<span class="sr" style="color:rgba(245,237,216,.4)">Not ready</span>');
      sl.innerHTML=`<span class="si">${icon}</span><span class="sn">${p.isBot?p.name.slice(0,8):p.name.slice(0,8)}</span>${rdyTxt}`;
    } else {
      sl.innerHTML='<span class="si">🀄</span>';
    }
  });
}

function pressReady(){
  if(isReady) return;
  isReady=true;
  $('bready').classList.add('pressed');
  $('bready').disabled=true;
  wss({type:'ready'});
}

function resetLobby(){
  mySeat=-1;inGame=false;selId=null;lastState=null;isReady=false;
  $('wa').style.display='none';
  $('bfind').style.display='block';
  $('cdiv').textContent='';
  $('bready').classList.remove('pressed');
  $('bready').disabled=false;
  document.querySelectorAll('.slot').forEach(sl=>{sl.innerHTML='<span class="si">🀄</span>';sl.className='slot';});
  show('s-lobby');
}

function goLobby(){
  if(inGame&&!confirm('Leave game and return to menu?')) return;
  inGame=false;
  wss({type:'leave'});
  if(ws){ws.onclose=null;ws.close();}
  resetLobby();
  setTimeout(connect,200);
}

// ── Game Start ─────────────────────────────────────────────────────────────────
function startGame(m){
  inGame=true;selId=null;lastState=null;
  const seats=m.seats;
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4,id=P[i],p=seats[abs];
    $('pn'+id).textContent=i===0?($('iname').value.trim()||'Player')+' (You)':(p?.name||'—');
    $('wb'+id).textContent=W[abs];
    if(i>0&&p?.isBot){const bt=$('bt'+id);if(bt)bt.textContent='CPU';}
    $('rs'+id).style.display='none';
  }
  $('chat-toggle').style.display='flex'; chatOpen=false; unreadCount=0; $('chat-history').innerHTML='';
  show('s-game');
}

function pid(abs){return P[(abs-mySeat+4)%4];}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderState(m){
  $('cw').textContent=W[(m.roundWind||1)-1];
  $('ci').textContent=`Round ${m.round||1}`;
  $('cwl').textContent=`${m.wallCount} tiles`;
  const h=m.honba||0,rs=m.riichiSticks||0;
  $('chonba').textContent=h||rs?`${h}本場${rs?' · '+'●'.repeat(rs):''}` :'';

  // Dora
  const dr=$('cdrow');dr.innerHTML='';
  for(const d of(m.dora||[])) dr.appendChild(mkElDora(d));

  // Scores & turn glow
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4,id=P[i];
    if(m.scores?.[abs]!==undefined) $('ps'+id).textContent=m.scores[abs].toLocaleString();
    $('np'+id).classList.toggle('active',m.turn===abs);
    if(m.riichi?.[abs]) $('rs'+id).style.display='';
  }

  // Status bar
  const mine=m.turn===mySeat,react=m.pending?.isForMe;
  const si=$('tst');
  if(react){si.className='tb-st my';si.textContent='⚡ React now!';}
  else if(mine){si.className='tb-st my';si.textContent='⭐ Your turn — click a tile';}
  else{si.className='tb-st';si.textContent=`${$('pn'+pid(m.turn))?.textContent||'—'}'s turn`;}
  $('tarrow').style.display=mine?'block':'none';

  // My hand — draw tile always goes to the far right with a separator
  const hc=$('hdb');hc.innerHTML='';
  const drawId=m.drawTile?.id;
  const hand=m.myHand||[];
  const mainHand=drawId?hand.filter(t=>t.id!==drawId):hand;
  const drawTile=drawId?hand.find(t=>t.id===drawId):null;
  const tw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--tlg-w'))||40;
  const th=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--tlg-h'))||56;
  mainHand.forEach(t=>{
    const el=mkEl(t,'tlg',tw,th);
    if(mine) el.classList.add('play');
    if(t.id===selId) el.classList.add('sel');
    el.dataset.tid=t.id;
    if(mine) el.onclick=()=>clickTile(t.id);
    hc.appendChild(el);
  });
  if(drawTile&&mine){
    // Separator gap between main hand and draw tile
    const sep=document.createElement('div');sep.className='draw-sep';hc.appendChild(sep);
    const el=mkEl(drawTile,'tlg',tw,th);
    el.classList.add('play','drw');
    el.dataset.tid=drawTile.id;
    el.onclick=()=>clickTile(drawTile.id);
    hc.appendChild(el);
  }

  // Opponent hands — back tiles
  // top (index 2): rot180 applied by .oh.rot180 class, tiles read correctly from top-player view
  // left (index 3): vertical
  // right (index 1): vertical
  [[1,'r',true],[2,'t',false],[3,'l',true]].forEach(([i,id,isVert])=>{
    const abs=(mySeat+i)%4;
    const hd=$('hd'+id); hd.innerHTML='';
    const cnt=m.oppHandSizes?.[abs]??13;
    for(let j=0;j<Math.min(cnt,16);j++){
      const b=document.createElement('div');
      b.className='tile tsm'+(isVert?' rot':'');
      hd.appendChild(b);
    }
  });

  // Discards
  const dzMap={b:'dzb',r:'dzr',t:'dzt',l:'dzl'};
  for(let i=0;i<4;i++){
    const abs=(mySeat+i)%4,id=P[i];
    const dz=$(dzMap[id]);dz.innerHTML='';
    for(const t of(m.discards?.[abs]||[])) dz.appendChild(mkElMd(t));
  }

  // My melds
  const ml=$('mlb');ml.innerHTML='';
  for(const meld of(m.myMelds||[])){
    const g=document.createElement('div');g.className='mg';
    for(const t of meld.tiles) g.appendChild(mkElMd(t));
    ml.appendChild(g);
  }

  $('tpb').style.display=(m.waits?.length>0&&!m.riichi?.[mySeat])?'':'none';
  drawActions(m);
}

function clickTile(id){
  if(selId===id){
    wss({type:'action',action:{type:'discard',tileId:id}});
    selId=null;
  } else {
    selId=id;
    $('hdb').querySelectorAll('.tlg').forEach(el=>{
      el.classList.toggle('sel',parseInt(el.dataset.tid)===id);
    });
    drawActions(lastState);
  }
}

function drawActions(m){
  const bar=$('actbar');bar.innerHTML='';
  if(!m) return;
  const mine=m.turn===mySeat,react=m.pending?.isForMe;
  if(mine){
    if((m.myHand||[]).length===14) ab(bar,'🀄 TSUMO','btsu',()=>wss({type:'action',action:{type:'tsumo'}}));
    if(!m.riichi?.[mySeat]&&!m.myMelds?.length&&(m.scores?.[mySeat]??25000)>=1000&&selId)
      ab(bar,'RIICHI','brii',()=>{wss({type:'action',action:{type:'riichi',tileId:selId}});selId=null;});
    if(selId) ab(bar,'DISCARD','bdis',()=>{wss({type:'action',action:{type:'discard',tileId:selId}});selId=null;});
    else hint(bar,'Click a tile · click again to discard');
  } else if(react){
    const opts=m.pending.options||[];
    if(opts.some(o=>o.type==='ron')) ab(bar,'🀄 RON!','bron',()=>wss({type:'action',action:{type:'ron'}}));
    if(opts.some(o=>o.type==='pon')) ab(bar,'PON','bpon',()=>wss({type:'action',action:{type:'pon'}}));
    if(opts.some(o=>o.type==='chi')){
      const c=opts.find(o=>o.type==='chi');
      ab(bar,'CHI','bchi',()=>wss({type:'action',action:{type:'chi',tileIds:c.sequences[0]}}));
    }
    ab(bar,'PASS','bpas',()=>wss({type:'action',action:{type:'pass'}}));
  } else {
    hint(bar,($('pn'+pid(m.turn))?.textContent||'—')+' is thinking…');
  }
}

function ab(c,l,cls,fn){const b=document.createElement('button');b.className='ba '+cls;b.textContent=l;b.onclick=fn;c.appendChild(b);}
function hint(c,t){const h=document.createElement('span');h.className='hint';h.textContent=t;c.appendChild(h);}

function mkEl(tile,cls,w,h){
  const el=document.createElement('div');el.className='tile '+cls;
  // If w/h not provided, read from CSS vars
  const root=document.documentElement;
  if(!w) w=parseInt(root.style.getPropertyValue('--tmd-w'))||26;
  if(!h) h=parseInt(root.style.getPropertyValue('--tmd-h'))||36;
  el.innerHTML=tsvg(tile,w,h);return el;
}
function mkElLg(tile){
  const r=document.documentElement;
  const w=parseInt(r.style.getPropertyValue('--tlg-w'))||40;
  const h=parseInt(r.style.getPropertyValue('--tlg-h'))||56;
  return mkEl(tile,'tlg',w,h);
}
function mkElMd(tile){
  const r=document.documentElement;
  const w=parseInt(r.style.getPropertyValue('--tmd-w'))||26;
  const h=parseInt(r.style.getPropertyValue('--tmd-h'))||36;
  return mkEl(tile,'tmd',w,h);
}
function mkElDora(tile){
  const r=document.documentElement;
  const w=parseInt(r.style.getPropertyValue('--tmd-w'))||26;
  const h=parseInt(r.style.getPropertyValue('--tmd-h'))||36;
  return mkEl(tile,'tdora',w,h);
}

// ── Chat ───────────────────────────────────────────────────────────────────────
const SEAT_COLORS=['#ffdd44','#ff8844','#44ddff','#88ff88'];
let chatOpen=false, unreadCount=0;

function toggleChat(){
  chatOpen=!chatOpen;
  $('chat-panel').classList.toggle('open',chatOpen);
  if(chatOpen){
    unreadCount=0;
    $('chat-toggle').classList.remove('has-unread');
    $('chat-toggle').textContent='💬';
    // Scroll history to bottom
    const h=$('chat-history');
    h.scrollTop=h.scrollHeight;
    $('chat-input').focus();
  }
}

function sendChat(){
  const inp=$('chat-input');
  const text=inp.value.trim();
  if(!text) return;
  wss({type:'chat',text});
  inp.value='';
}

function showChatMsg(seat,name,text){
  const relSeat=(seat-mySeat+4)%4;
  const color=SEAT_COLORS[relSeat]||'#fff';

  // ── Floating big message ──
  const container=$('chat-float');
  const div=document.createElement('div');
  div.className='chat-msg';
  div.style.color=color;
  div.innerHTML=`<span class="chat-who">${escHtml(name)}</span>${escHtml(text)}`;
  container.appendChild(div);
  setTimeout(()=>div.remove(),5200);

  // ── History entry ──
  const history=$('chat-history');
  const now=new Date();
  const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const entry=document.createElement('div');
  entry.className='chat-entry';
  entry.innerHTML=
    `<span class="chat-entry-who" style="color:${color}">${escHtml(name)}</span>`+
    `<span class="chat-entry-text">${escHtml(text)}</span>`+
    `<span class="chat-entry-time">${time}</span>`;
  history.appendChild(entry);
  history.scrollTop=history.scrollHeight;

  // ── Unread badge ──
  if(!chatOpen){
    unreadCount++;
    $('chat-toggle').classList.add('has-unread');
    $('chat-toggle').textContent=`💬${unreadCount}`;
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Riichi / Toast ────────────────────────────────────────────────────────────
function onRiichi(m){$('rs'+pid(m.seat)).style.display='';toast('リーチ — '+(m.name||'Player'));}
function toast(msg){
  const tc=$('tc'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  tc.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// ── Round End ──────────────────────────────────────────────────────────────────
function onEnd(m){
  inGame=false;
  $('chat-toggle').style.display='none'; $('chat-panel').classList.remove('open'); chatOpen=false;
  const T={tsumo:'🀄 TSUMO!',ron:'🀄 RON!',draw:'流局 — Draw'};
  $('ret').textContent=T[m.reason]||'Round Over';
  $('rehn').textContent=m.handLabel?`${m.handLabel} · ${m.han||0}飜${m.fu?' · '+m.fu+'符':''}` :'';
  const yl=$('reyl');yl.innerHTML='';
  for(const y of(m.yakuList||[])){
    const c=document.createElement('div');c.className='yc';
    c.innerHTML=`${y.name}<span class="yh">${y.han}飜</span><span class="yj">${y.jp||''}</span>`;
    yl.appendChild(c);
  }
  const wt=$('rewt');wt.innerHTML='';
  for(const t of(m.hand||[])) if(t) wt.appendChild(mkElMd(t));
  const tbl=$('rest');tbl.innerHTML='';
  (m.scores||[]).forEach((sc,seat)=>{
    const name=seat===mySeat?'⭐ '+($('iname').value.trim()||'You'):(m.playerNames?.[seat]||`Seat ${seat}`);
    const row=document.createElement('tr');if(seat===m.winner)row.className='w';
    row.innerHTML=`<td>${W[seat]} ${name}</td><td>${sc.toLocaleString()}</td>`;
    tbl.appendChild(row);
  });
  show('s-end');
}

// ── Responsive tile sizing ───────────────────────────────────────────────────────
function updateTileSizes(){
  const vmin=Math.min(window.innerWidth,window.innerHeight);
  // Large tiles: target ~6.5% of vmin each, capped for desktop
  const lgW=Math.round(Math.min(vmin*0.066,46));
  const lgH=Math.round(lgW*1.38);
  // Medium tiles (discards): ~60% of large
  const mdW=Math.round(lgW*0.63);
  const mdH=Math.round(lgH*0.63);
  // Small tiles (opponent backs): ~42% of large
  const smW=Math.round(lgW*0.42);
  const smH=Math.round(lgH*0.42);
  const root=document.documentElement;
  root.style.setProperty('--tlg-w',lgW+'px');
  root.style.setProperty('--tlg-h',lgH+'px');
  root.style.setProperty('--tmd-w',mdW+'px');
  root.style.setProperty('--tmd-h',mdH+'px');
  root.style.setProperty('--tsm-w',smW+'px');
  root.style.setProperty('--tsm-h',smH+'px');
}
window.addEventListener('resize',updateTileSizes);
updateTileSizes();

// ── Boot ───────────────────────────────────────────────────────────────────────
$('bfind').onclick=findMatch;
$('bready').onclick=pressReady;
$('bcancel').onclick=()=>{wss({type:'leave'});resetLobby();};
$('bleave').onclick=goLobby;
$('iname').onkeydown=e=>{if(e.key==='Enter')findMatch();};
$('chat-send').onclick=sendChat;
$('chat-input').onkeydown=e=>{if(e.key==='Enter')sendChat();};
$('chat-toggle').onclick=toggleChat;
$('chat-close').onclick=toggleChat;
connect();
</script>
